<script type="text/html" data-help-name="api-endpoint">
    <p>Configures an API endpoint with path, HTTP method, and request validation for the API Gateway.</p>

    <h3>Properties</h3>
    <dl class="message-properties">
        <dt>Server
            <span class="property-type">api-server</span>
        </dt>
        <dd>Reference to the API Server configuration node that will handle this endpoint.</dd>

        <dt>Method
            <span class="property-type">string</span>
        </dt>
        <dd>The HTTP method for this endpoint: GET, POST, PUT, DELETE, or PATCH.</dd>

        <dt>Path
            <span class="property-type">string</span>
        </dt>
        <dd>The URL path pattern for this endpoint. Supports path parameters using colon notation
            (e.g., <code>/users/:id</code>).</dd>

        <dt>Validation
            <span class="property-type">boolean</span>
        </dt>
        <dd>Enable or disable request validation. When enabled, requests are validated against the defined schemas.</dd>

        <dt>Request Body Schema
            <span class="property-type">JSON Schema</span>
        </dt>
        <dd>JSON Schema to validate the request body (typically for POST, PUT, PATCH requests).</dd>

        <dt>Query Parameters Schema
            <span class="property-type">JSON Schema</span>
        </dt>
        <dd>JSON Schema to validate query string parameters. Type coercion is automatically applied.</dd>

        <dt>Path Parameters Schema
            <span class="property-type">JSON Schema</span>
        </dt>
        <dd>JSON Schema to validate path parameters. Type coercion is automatically applied.</dd>

        <dt>Success Code
            <span class="property-type">number</span>
        </dt>
        <dd>The HTTP status code for successful responses (200, 201, 202, or 204).</dd>

        <dt>Content-Type
            <span class="property-type">string</span>
        </dt>
        <dd>The Content-Type header for responses (e.g., application/json, application/xml).</dd>

        <dt>Dev Mode
            <span class="property-type">boolean</span>
        </dt>
        <dd>Enable response validation for debugging. When enabled, outgoing responses are validated against the response schemas.</dd>

        <dt>Response Schemas
            <span class="property-type">object</span>
        </dt>
        <dd>JSON object mapping HTTP status codes to JSON Schemas. Used for OpenAPI generation and optional response validation.</dd>

        <dt>Required Scopes
            <span class="property-type">string</span>
        </dt>
        <dd>Comma-separated list of OAuth2 scopes required to access this endpoint. When configured, requests without valid scopes will receive 401 (unauthenticated) or 403 (insufficient permissions) responses.</dd>

        <dt>Scope Operator
            <span class="property-type">string</span>
        </dt>
        <dd>Controls how multiple scopes are evaluated: <b>AND</b> requires all scopes to be present, <b>OR</b> requires at least one scope.</dd>

        <dt>CRUD Operation
            <span class="property-type">string</span>
        </dt>
        <dd>Maps this endpoint to a database CRUD operation: <b>list</b> (GET all), <b>get</b> (GET by ID), <b>create</b> (POST), <b>update</b> (PUT), or <b>delete</b> (DELETE).</dd>

        <dt>Table Name
            <span class="property-type">string</span>
        </dt>
        <dd>Database table name for the CRUD operation. Supports schema.table notation (e.g., <code>public.users</code>).</dd>

        <dt>Primary Key
            <span class="property-type">string</span>
        </dt>
        <dd>Primary key column name for get, update, and delete operations. Defaults to <code>id</code>.</dd>

        <dt>Auto SQL
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, generates basic SQL templates that are added to <code>msg.crud.sql</code>.</dd>

        <dt>Flow Output
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, delegates database operations to the flow for custom business logic. The CRUD context is passed in <code>msg.crud</code>.</dd>

        <dt>Enable Pagination
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, the endpoint parses pagination parameters from query string and provides pagination context in <code>msg.pagination</code>.</dd>

        <dt>Pagination Style
            <span class="property-type">string</span>
        </dt>
        <dd>Choose between <b>offset</b> (uses page/limit/offset params) or <b>cursor</b> (uses cursor/limit params) pagination.</dd>

        <dt>Default Page Size
            <span class="property-type">number</span>
        </dt>
        <dd>The default number of items per page when no limit is specified. Default is 20.</dd>

        <dt>Max Page Size
            <span class="property-type">number</span>
        </dt>
        <dd>The maximum number of items allowed per page. Requests for larger limits are capped at this value. Default is 100.</dd>

        <dt>Enable Filtering
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, the endpoint parses filter parameters from query string and provides filter context in <code>msg.filtering</code>.</dd>

        <dt>Filterable Fields
            <span class="property-type">string</span>
        </dt>
        <dd>Comma-separated list of field names that can be filtered. Only these fields will be accepted in filter parameters.</dd>

        <dt>Enable Sorting
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, the endpoint parses sort parameters from query string and provides sort context in <code>msg.sorting</code>.</dd>

        <dt>Sortable Fields
            <span class="property-type">string</span>
        </dt>
        <dd>Comma-separated list of field names that can be sorted. Only these fields will be accepted in sort parameters.</dd>

        <dt>Default Sort Field
            <span class="property-type">string</span>
        </dt>
        <dd>The field to sort by when no sort parameter is provided. Leave empty for no default sorting.</dd>

        <dt>Default Sort Direction
            <span class="property-type">string</span>
        </dt>
        <dd>The default sort direction (<b>asc</b> or <b>desc</b>) when using the default sort field.</dd>
    </dl>

    <h3>Path Parameters</h3>
    <p>Path parameters are defined using a colon followed by the parameter name. For example:</p>
    <ul>
        <li><code>/users/:id</code> - captures a user ID</li>
        <li><code>/posts/:postId/comments/:commentId</code> - captures both post and comment IDs</li>
    </ul>

    <h3>Schema Validation</h3>
    <p>Request validation uses JSON Schema (draft-07). Common formats are supported:</p>
    <ul>
        <li><code>email</code> - validates email addresses</li>
        <li><code>uri</code> - validates URIs</li>
        <li><code>date-time</code> - validates ISO 8601 date-times</li>
        <li><code>uuid</code> - validates UUIDs</li>
    </ul>

    <h3>Example Body Schema</h3>
    <pre>{
  "type": "object",
  "properties": {
    "name": { "type": "string", "minLength": 1 },
    "email": { "type": "string", "format": "email" },
    "age": { "type": "integer", "minimum": 0 }
  },
  "required": ["name", "email"]
}</pre>

    <h3>Response Schema Configuration</h3>
    <p>Response schemas define the expected format of API responses for different status codes.
    They are used for:</p>
    <ul>
        <li>OpenAPI specification generation</li>
        <li>Optional response validation in development mode</li>
        <li>API documentation</li>
    </ul>

    <h3>Example Response Schemas</h3>
    <pre>{
  "200": {
    "type": "object",
    "properties": {
      "id": { "type": "integer" },
      "name": { "type": "string" },
      "email": { "type": "string", "format": "email" }
    },
    "required": ["id", "name"]
  },
  "404": {
    "type": "object",
    "properties": {
      "error": { "type": "string" },
      "message": { "type": "string" }
    }
  },
  "default": {
    "type": "object",
    "properties": {
      "error": { "type": "string" }
    }
  }
}</pre>

    <h3>Validation Errors</h3>
    <p>When validation fails:</p>
    <ul>
        <li>If <code>msg.res</code> is available, a 400 Bad Request response is automatically sent</li>
        <li>The error details are added to <code>msg.validationError</code></li>
        <li>The error response includes the path, message, and details for each validation failure</li>
    </ul>

    <h3>Authorization</h3>
    <p>When required scopes are configured, the endpoint checks authorization before processing requests:</p>
    <ul>
        <li><b>401 Unauthorized</b>: Returned when <code>msg.req.auth.authenticated</code> is not set (user not logged in)</li>
        <li><b>403 Forbidden</b>: Returned when the user's scopes don't satisfy the required scopes</li>
    </ul>
    <p>The authorization check expects scopes to be provided in <code>msg.req.auth.scopes</code> as an array of strings.</p>

    <h3>Example Authorization Configuration</h3>
    <p>For an endpoint requiring admin access:</p>
    <ul>
        <li>Required Scopes: <code>admin:read, admin:write</code></li>
        <li>Operator: <b>AND</b> - User must have both scopes</li>
    </ul>
    <p>For an endpoint accessible by multiple roles:</p>
    <ul>
        <li>Required Scopes: <code>admin, moderator, owner</code></li>
        <li>Operator: <b>OR</b> - User needs at least one scope</li>
    </ul>

    <h3>CRUD Operation Mapping</h3>
    <p>The CRUD mapping feature allows you to map HTTP endpoints to database operations. When configured:</p>
    <ul>
        <li>A <code>msg.crud</code> object is added with operation details</li>
        <li>When Auto SQL is enabled, SQL templates are generated</li>
        <li>The flow can use this context to execute database operations</li>
    </ul>

    <h3>CRUD Operations</h3>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
        <tr style="background: #f5f5f5;">
            <th style="padding: 8px; border: 1px solid #ddd;">Operation</th>
            <th style="padding: 8px; border: 1px solid #ddd;">HTTP Method</th>
            <th style="padding: 8px; border: 1px solid #ddd;">SQL Template</th>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>list</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">GET</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>SELECT * FROM table</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>get</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">GET</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>SELECT * FROM table WHERE pk = @pk</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>create</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">POST</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>INSERT INTO table (@columns) VALUES (@values)</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>update</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">PUT</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>UPDATE table SET @assignments WHERE pk = @pk</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>delete</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">DELETE</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>DELETE FROM table WHERE pk = @pk</code></td>
        </tr>
    </table>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>req.body <span class="property-type">any</span></dt>
        <dd>Request body to validate against the body schema.</dd>
        <dt>req.query <span class="property-type">object</span></dt>
        <dd>Query parameters to validate against the query schema.</dd>
        <dt>req.params <span class="property-type">object</span></dt>
        <dd>Path parameters to validate against the params schema.</dd>
        <dt>req.auth.authenticated <span class="property-type">boolean</span></dt>
        <dd>Whether the request is authenticated (populated by upstream auth middleware).</dd>
        <dt>req.auth.scopes <span class="property-type">array</span></dt>
        <dd>Array of OAuth2 scope strings associated with the authenticated user/token.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>endpoint <span class="property-type">object</span></dt>
        <dd>Endpoint metadata including path, method, paramNames, validationEnabled, successStatusCode, responseContentType, validateResponseEnabled, requiredScopes, scopeOperator, and CRUD configuration.</dd>
        <dt>validationError <span class="property-type">object</span></dt>
        <dd>Present only when validation fails. Contains statusCode, error, message, and details.</dd>
        <dt>authorizationError <span class="property-type">object</span></dt>
        <dd>Present only when authorization fails. Contains statusCode (401 or 403), error, message, and details including requiredScopes, scopeOperator, and missingScopes.</dd>
        <dt>crud <span class="property-type">object</span></dt>
        <dd>Present when a CRUD operation is configured. Contains <code>operation</code>, <code>tableName</code>, <code>primaryKey</code>, and optionally <code>sql</code> (when Auto SQL is enabled) with the generated SQL template.</dd>
        <dt>pagination <span class="property-type">object</span></dt>
        <dd>Present when pagination is enabled and query params exist. Contains parsed pagination parameters based on the configured style.</dd>
        <dt>filtering <span class="property-type">object</span></dt>
        <dd>Present when filtering is enabled and query params exist. Contains <code>filters</code> array, <code>errors</code> array, and <code>whereClause</code> object with generated SQL.</dd>
        <dt>sorting <span class="property-type">object</span></dt>
        <dd>Present when sorting is enabled and query params exist. Contains <code>sorts</code> array, <code>errors</code> array, and <code>orderByClause</code> string with generated SQL.</dd>
        <dt>transformationError <span class="property-type">object</span></dt>
        <dd>Present only when request transformation fails. Contains statusCode (400), error, message, and details.</dd>
    </dl>

    <h3>Pagination Support</h3>
    <p>When pagination is enabled, the endpoint automatically parses pagination parameters from the query string and adds them to <code>msg.pagination</code>.</p>

    <h4>Offset-Based Pagination</h4>
    <p>Uses traditional page-based navigation with the following query parameters:</p>
    <ul>
        <li><code>page</code> - Page number (1-indexed)</li>
        <li><code>limit</code> - Number of items per page</li>
        <li><code>offset</code> - Number of items to skip (alternative to page)</li>
    </ul>
    <p>The <code>msg.pagination</code> object contains:</p>
    <pre>{
  "style": "offset",
  "page": 1,
  "limit": 20,
  "offset": 0,
  "cursor": null
}</pre>

    <h4>Cursor-Based Pagination</h4>
    <p>Uses opaque cursors for efficient pagination of large datasets:</p>
    <ul>
        <li><code>cursor</code> - Opaque cursor string from previous response</li>
        <li><code>limit</code> - Number of items per page</li>
    </ul>
    <p>The <code>msg.pagination</code> object contains:</p>
    <pre>{
  "style": "cursor",
  "limit": 20,
  "cursor": "eyJpZCI6MTAwfQ==",
  "page": null,
  "offset": null
}</pre>

    <h4>Generating Response Metadata</h4>
    <p>Use the <code>generatePaginationMeta()</code> method to create pagination metadata for your response:</p>
    <pre>// In a function node after database query
const meta = node.context().flow.get('endpointNode').generatePaginationMeta(
  msg.pagination,
  {
    total: 150,     // Total item count (optional for cursor-based)
    count: 20,      // Items in current page
    nextCursor: 'eyJpZCI6MTIwfQ==',  // For cursor-based
    prevCursor: 'eyJpZCI6ODB9'       // For cursor-based
  }
);</pre>

    <h3>Methods Available</h3>
    <p>The node provides several methods for use by other nodes:</p>
    <dl class="message-properties">
        <dt>validateResponseData(statusCode, data)</dt>
        <dd>Validates response data against the schema for the given status code. Returns a ValidationResult.</dd>
        <dt>getResponseSchema(statusCode)</dt>
        <dd>Returns the JSON Schema for the given status code, or the default schema if not found.</dd>
        <dt>getOpenApiResponses()</dt>
        <dd>Returns response definitions in OpenAPI format for documentation generation.</dd>
        <dt>checkAuthorization(tokenScopes)</dt>
        <dd>Checks if the provided token scopes satisfy the endpoint's required scopes. Returns <code>{authorized: boolean, missingScopes: array}</code>.</dd>
        <dt>getOpenApiSecurity()</dt>
        <dd>Returns OpenAPI security requirements for this endpoint (OAuth2 scopes). Returns an empty array if no scopes are required.</dd>
        <dt>getCrudSql()</dt>
        <dd>Returns the generated SQL template object when Auto SQL is enabled. Returns <code>null</code> if no CRUD operation or Auto SQL is disabled.</dd>
        <dt>getCrudInfo()</dt>
        <dd>Returns the CRUD operation configuration: <code>{operation, tableName, primaryKey, autoGenerateSql, useFlowOutput, hasCrudOperation}</code>.</dd>
        <dt>getPaginationConfig()</dt>
        <dd>Returns the pagination configuration: <code>{enabled, defaultPageSize, maxPageSize, style}</code>.</dd>
        <dt>parsePagination(query)</dt>
        <dd>Parses pagination parameters from a query object. Returns <code>null</code> if pagination is disabled, otherwise returns the parsed pagination params.</dd>
        <dt>generatePaginationMeta(params, resultInfo)</dt>
        <dd>Generates pagination metadata for responses. Pass the parsed pagination params and result info (total, count, nextCursor, prevCursor). Returns metadata object with hasNext, hasPrev, etc.</dd>
        <dt>getFilteringConfig()</dt>
        <dd>Returns the filtering configuration: <code>{enabled, filterableFields}</code>.</dd>
        <dt>getSortingConfig()</dt>
        <dd>Returns the sorting configuration: <code>{enabled, sortableFields, defaultSortField, defaultSortDirection}</code>.</dd>
        <dt>parseFilters(query)</dt>
        <dd>Parses filter parameters from a query object. Returns <code>null</code> if filtering is disabled, otherwise returns <code>{filters: array, errors: array}</code>.</dd>
        <dt>parseSorts(query)</dt>
        <dd>Parses sort parameters from a query object. Returns <code>null</code> if sorting is disabled, otherwise returns <code>{sorts: array, errors: array}</code>.</dd>
        <dt>generateWhereClause(filters, paramPrefix)</dt>
        <dd>Generates SQL WHERE clause from parsed filters. Returns <code>{clause: string, params: object}</code>.</dd>
        <dt>generateOrderByClause(sorts)</dt>
        <dd>Generates SQL ORDER BY clause from parsed sorts. Returns a string like <code>ORDER BY field ASC</code>.</dd>
        <dt>getTransformationConfig()</dt>
        <dd>Returns the transformation configuration: <code>{enabled, hasRequestTransform, hasResponseTransform, hasFieldMappings}</code>.</dd>
        <dt>transformRequestBody(body, context)</dt>
        <dd>Transforms request body using configured field mappings and JSONata expression. Returns <code>{success: boolean, data: any, error?: string}</code>.</dd>
        <dt>transformResponseData(data, context)</dt>
        <dd>Transforms response data using configured JSONata expression. Returns <code>{success: boolean, data: any, error?: string}</code>.</dd>
    </dl>

    <h3>Filtering Support</h3>
    <p>When filtering is enabled, the endpoint automatically parses filter parameters from the query string and adds them to <code>msg.filtering</code>.</p>

    <h4>Filter Syntax</h4>
    <p>Filters use the <code>filter[field]=value</code> format. Operators can be specified as <code>filter[field][op]=value</code>:</p>
    <ul>
        <li><code>filter[status]=active</code> - Equality (default)</li>
        <li><code>filter[age][gte]=18</code> - Greater than or equal</li>
        <li><code>filter[name][like]=%john%</code> - Pattern matching</li>
        <li><code>filter[status][in]=active,pending</code> - In list</li>
    </ul>

    <h4>Supported Operators</h4>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
        <tr style="background: #f5f5f5;">
            <th style="padding: 8px; border: 1px solid #ddd;">Operator</th>
            <th style="padding: 8px; border: 1px solid #ddd;">Description</th>
            <th style="padding: 8px; border: 1px solid #ddd;">SQL</th>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>eq</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Equal (default)</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>field = @value</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>ne</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Not equal</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>field != @value</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>gt</code>, <code>gte</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Greater than (or equal)</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>field > @value</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>lt</code>, <code>lte</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Less than (or equal)</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>field < @value</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>like</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">Pattern matching</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>field LIKE @value</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>in</code></td>
            <td style="padding: 8px; border: 1px solid #ddd;">In list</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>field IN (@v1, @v2)</code></td>
        </tr>
    </table>

    <p>The <code>msg.filtering</code> object contains:</p>
    <pre>{
  "filters": [
    { "field": "status", "operator": "eq", "value": "active" },
    { "field": "age", "operator": "gte", "value": "18" }
  ],
  "errors": [],
  "whereClause": {
    "clause": "WHERE status = @filter_status_0 AND age >= @filter_age_1",
    "params": { "filter_status_0": "active", "filter_age_1": "18" }
  }
}</pre>

    <h3>Sorting Support</h3>
    <p>When sorting is enabled, the endpoint automatically parses sort parameters from the query string and adds them to <code>msg.sorting</code>.</p>

    <h4>Sort Syntax</h4>
    <ul>
        <li><code>sort=name</code> - Sort by name ascending</li>
        <li><code>sort=-created_at</code> - Sort by created_at descending (- prefix)</li>
        <li><code>sort=status,-created_at</code> - Multiple fields (comma-separated)</li>
    </ul>

    <p>The <code>msg.sorting</code> object contains:</p>
    <pre>{
  "sorts": [
    { "field": "status", "direction": "asc" },
    { "field": "created_at", "direction": "desc" }
  ],
  "errors": [],
  "orderByClause": "ORDER BY status ASC, created_at DESC"
}</pre>

    <h3>Transformation Support</h3>
    <p>When transformation is enabled, the endpoint can transform request bodies before validation and provide response transformation expressions for downstream use.</p>

    <h4>Request Transformation</h4>
    <p>Request transformations are applied <b>before</b> validation. This allows you to:</p>
    <ul>
        <li>Normalize incoming data formats</li>
        <li>Rename fields to match internal conventions</li>
        <li>Compute derived fields</li>
        <li>Restructure nested data</li>
    </ul>

    <h4>JSONata Expressions</h4>
    <p>Transformations use <a href="https://jsonata.org" target="_blank">JSONata</a>, a lightweight query and transformation language for JSON.</p>

    <h5>Context Variables</h5>
    <p>The following variables are available in transformation expressions:</p>
    <ul>
        <li><code>$</code> - The data being transformed (request body or response data)</li>
        <li><code>$msg</code> - The full message object</li>
        <li><code>$params</code> - Path parameters</li>
        <li><code>$query</code> - Query parameters</li>
        <li><code>$headers</code> - Request headers</li>
    </ul>

    <h5>Example: Request Transformation</h5>
    <pre>$merge([$$, {
  "fullName": $.firstName & " " & $.lastName,
  "emailLower": $lowercase($.email),
  "createdAt": $now()
}])</pre>
    <p>This merges the original body with computed fields.</p>

    <h5>Example: Response Transformation</h5>
    <pre>{
  "id": $.id,
  "displayName": $.full_name,
  "contact": {
    "email": $.email,
    "phone": $.phone_number
  },
  "active": $.status = "active"
}</pre>
    <p>This reshapes the response data for the API consumer.</p>

    <h4>Field Mappings</h4>
    <p>For simple field renaming, use the field mappings feature instead of JSONata:</p>
    <pre>firstName->first_name, lastName->last_name, emailAddr->email</pre>
    <p>Field mappings are applied <b>before</b> JSONata expressions.</p>

    <h4>Response Transformation Usage</h4>
    <p>Response transformations are stored in <code>msg.endpoint.responseTransformExpression</code> for downstream nodes to apply. Example usage in a function node:</p>
    <pre>// Apply response transformation
if (msg.endpoint.responseTransformExpression) {
    const jsonata = require('jsonata');
    const expr = jsonata(msg.endpoint.responseTransformExpression);
    msg.payload = await expr.evaluate(msg.payload);
}
return msg;</pre>

    <h3>Rate Limiting Support</h3>
    <p>When rate limiting is enabled, the endpoint enforces request limits per time window using a token bucket algorithm.</p>

    <h4>Configuration</h4>
    <dl class="message-properties">
        <dt>Enable Rate Limiting
            <span class="property-type">boolean</span>
        </dt>
        <dd>Enable or disable rate limiting for this endpoint.</dd>

        <dt>Requests
            <span class="property-type">number</span>
        </dt>
        <dd>Maximum number of requests allowed per time window. Default is 100.</dd>

        <dt>Window
            <span class="property-type">number</span>
        </dt>
        <dd>Time window in milliseconds. Default is 60000 (1 minute).</dd>

        <dt>Key Type
            <span class="property-type">string</span>
        </dt>
        <dd>The method used to identify clients for rate limiting:
            <ul>
                <li><b>IP Address:</b> Uses client IP (supports X-Forwarded-For for proxied requests)</li>
                <li><b>User ID:</b> Uses authenticated user ID from <code>req.auth.userId</code> or <code>req.auth.sub</code></li>
                <li><b>API Key:</b> Uses API key from <code>X-API-Key</code> header or Authorization Bearer token</li>
                <li><b>Custom:</b> Uses a custom path expression to extract the key from the request</li>
            </ul>
        </dd>

        <dt>Key Path (Custom only)
            <span class="property-type">string</span>
        </dt>
        <dd>Dot-notation path to extract the rate limit key from the request object (e.g., <code>headers.x-tenant-id</code>).</dd>
    </dl>

    <h4>Response Headers</h4>
    <p>When rate limiting is enabled, the following headers are added to all responses:</p>
    <ul>
        <li><code>X-RateLimit-Limit</code> - Maximum requests per window</li>
        <li><code>X-RateLimit-Remaining</code> - Remaining requests in current window</li>
        <li><code>X-RateLimit-Reset</code> - Unix timestamp when the window resets</li>
        <li><code>Retry-After</code> - Seconds to wait before retrying (only on 429 responses)</li>
    </ul>

    <h4>429 Response</h4>
    <p>When a client exceeds the rate limit, a 429 Too Many Requests response is returned:</p>
    <pre>{
  "statusCode": 429,
  "error": "Too Many Requests",
  "message": "Rate limit exceeded. Please try again later.",
  "details": {
    "limit": 100,
    "remaining": 0,
    "resetTime": "2024-01-01T12:01:00.000Z",
    "retryAfter": 30
  }
}</pre>

    <h4>Message Context</h4>
    <p>When rate limiting is enabled, the <code>msg.rateLimit</code> object is added to the message:</p>
    <pre>{
  "allowed": true,
  "limit": 100,
  "remaining": 95,
  "resetTime": 1704110460000,
  "key": "192.168.1.1"
}</pre>

    <h4>Rate Limit Error</h4>
    <p>When rate limited, <code>msg.rateLimitError</code> contains the error details. The message flow is stopped and a 429 response is sent automatically if <code>msg.res</code> is available.</p>

    <h4>Methods Available</h4>
    <dl class="message-properties">
        <dt>getRateLimitingConfig()</dt>
        <dd>Returns the rate limiting configuration: <code>{enabled, requests, windowMs, keyType, customKeyPath}</code>.</dd>
        <dt>checkRateLimit(req)</dt>
        <dd>Checks rate limit for a request. Returns <code>{allowed, remaining, limit, resetTime, retryAfter, key}</code>.</dd>
        <dt>getRateLimitStatistics()</dt>
        <dd>Returns rate limiter statistics including total checks, allowed/blocked counts, and block rate.</dd>
        <dt>resetRateLimit(key)</dt>
        <dd>Resets rate limit for a specific key.</dd>
    </dl>

    <h3>Response Caching Support</h3>
    <p>When caching is enabled, the endpoint caches responses for GET and HEAD requests using an LRU cache with TTL expiration.</p>

    <h4>Configuration</h4>
    <dl class="message-properties">
        <dt>Enable Caching
            <span class="property-type">boolean</span>
        </dt>
        <dd>Enable or disable response caching for this endpoint.</dd>

        <dt>TTL (ms)
            <span class="property-type">number</span>
        </dt>
        <dd>Time to live in milliseconds. Default is 300000 (5 minutes). Set to 0 for no expiry.</dd>

        <dt>Max Size
            <span class="property-type">number</span>
        </dt>
        <dd>Maximum number of cached responses. Default is 100. Uses LRU eviction.</dd>

        <dt>Key Strategy
            <span class="property-type">string</span>
        </dt>
        <dd>The method used to generate cache keys:
            <ul>
                <li><b>Full:</b> method + path + sorted query parameters</li>
                <li><b>Path:</b> method + path only (ignores query params)</li>
                <li><b>Query:</b> Same as Full</li>
                <li><b>Custom:</b> Uses custom expression to extract key</li>
            </ul>
        </dd>

        <dt>Key Expression (Custom only)
            <span class="property-type">string</span>
        </dt>
        <dd>Dot-notation path to extract the cache key from the request object.</dd>

        <dt>Vary Headers
            <span class="property-type">string</span>
        </dt>
        <dd>Comma-separated header names to include in cache key variation (e.g., "Accept, Accept-Language").</dd>

        <dt>Private
            <span class="property-type">boolean</span>
        </dt>
        <dd>Use private cache (Cache-Control: private instead of public).</dd>
    </dl>

    <h4>Response Headers</h4>
    <p>When caching is enabled, the following headers are added to responses:</p>
    <ul>
        <li><code>Cache-Control</code> - Cache directives (public/private, max-age)</li>
        <li><code>ETag</code> - Entity tag for conditional requests</li>
        <li><code>Vary</code> - Headers that affect cache variation</li>
        <li><code>X-Cache</code> - HIT or MISS indicator</li>
        <li><code>Age</code> - Time since response was cached (seconds)</li>
    </ul>

    <h4>Conditional Requests</h4>
    <p>The endpoint supports conditional requests with the <code>If-None-Match</code> header:</p>
    <ul>
        <li>Client sends <code>If-None-Match: "etag-value"</code></li>
        <li>If ETag matches cached response, returns 304 Not Modified</li>
        <li>Otherwise, returns full response with new ETag</li>
    </ul>

    <h4>Message Context</h4>
    <p>When caching is enabled, the <code>msg.cache</code> object is added to the message:</p>
    <pre>{
  "hit": true,
  "key": "GET|/users|page=1",
  "age": 30000
}</pre>

    <h4>Cache Methods</h4>
    <dl class="message-properties">
        <dt>getCachingConfig()</dt>
        <dd>Returns the caching configuration: <code>{enabled, ttl, maxSize, keyStrategy, keyExpression, varyHeaders, private}</code>.</dd>
        <dt>checkCache(req)</dt>
        <dd>Checks cache for a request. Returns <code>{hit, data, statusCode, etag, age, key}</code>.</dd>
        <dt>storeInCache(req, data, statusCode, headers)</dt>
        <dd>Stores a response in the cache. Returns <code>{key, etag}</code>.</dd>
        <dt>invalidateCache(req)</dt>
        <dd>Removes a cache entry by request.</dd>
        <dt>clearCache()</dt>
        <dd>Clears all cached entries.</dd>
        <dt>getCacheStatistics()</dt>
        <dd>Returns cache statistics including hits, misses, evictions, and hit rate.</dd>
        <dt>generateETag(data)</dt>
        <dd>Generates an ETag for the given data.</dd>
        <dt>checkConditionalRequest(req, etag)</dt>
        <dd>Checks if request has matching If-None-Match header.</dd>
    </dl>

    <h4>Cache Invalidation</h4>
    <p>To invalidate cached responses (e.g., after mutations), use the cache methods:</p>
    <pre>// In a function node after a successful POST/PUT/DELETE
const endpointNode = RED.nodes.getNode("endpoint-node-id");
if (endpointNode) {
    endpointNode.clearCache();  // Clear all cached responses
    // Or invalidate specific entry
    endpointNode.invalidateCache(msg.req);
}</pre>
</script>
