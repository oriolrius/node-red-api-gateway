<script type="text/javascript">
    RED.nodes.registerType('api-endpoint', {
        category: 'API Gateway',
        color: '#87CEEB',
        defaults: {
            name: { value: "" },
            server: { value: "", type: "api-server" },
            path: { value: "/", required: true },
            method: { value: "GET", required: true },
            validationEnabled: { value: true },
            bodySchema: { value: "" },
            querySchema: { value: "" },
            paramsSchema: { value: "" },
            // Response configuration
            successStatusCode: { value: "200" },
            responseContentType: { value: "application/json" },
            responseSchemas: { value: "" },
            validateResponseEnabled: { value: false },
            // Authorization configuration
            requiredScopes: { value: "" },
            scopeOperator: { value: "AND" },
            // CRUD operation mapping
            crudOperation: { value: "none" },
            tableName: { value: "" },
            primaryKey: { value: "id" },
            autoGenerateSql: { value: false },
            useFlowOutput: { value: true },
            // Pagination
            paginationEnabled: { value: false },
            defaultPageSize: { value: "20" },
            maxPageSize: { value: "100" },
            paginationStyle: { value: "offset" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-plug",
        label: function() {
            if (this.name) {
                return this.name;
            }
            if (this.path && this.method) {
                return this.method + " " + this.path;
            }
            return "API endpoint";
        },
        paletteLabel: "API endpoint",
        oneditprepare: function() {
            var node = this;

            // Path validation function
            function validatePath(path) {
                if (!path || path.trim() === '') {
                    return { valid: false, error: 'Path is required' };
                }
                if (!path.startsWith('/')) {
                    return { valid: false, error: 'Path must start with /' };
                }
                if (path.indexOf('//') !== -1) {
                    return { valid: false, error: 'Path cannot contain double slashes' };
                }
                var invalidParamRegex = /:([^/]*)/g;
                var match;
                while ((match = invalidParamRegex.exec(path)) !== null) {
                    var paramName = match[1];
                    if (paramName && !/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(paramName)) {
                        return { valid: false, error: 'Invalid parameter name: ' + paramName };
                    }
                }
                return { valid: true };
            }

            // JSON Schema validation
            function validateJsonSchema(schemaStr) {
                if (!schemaStr || schemaStr.trim() === '') {
                    return { valid: true };
                }
                try {
                    var schema = JSON.parse(schemaStr);
                    if (typeof schema !== 'object' || schema === null) {
                        return { valid: false, error: 'Schema must be a JSON object' };
                    }
                    return { valid: true };
                } catch (e) {
                    return { valid: false, error: 'Invalid JSON: ' + e.message };
                }
            }

            // Format JSON in textarea
            function formatJson(textareaId) {
                var $textarea = $(textareaId);
                var value = $textarea.val().trim();
                if (value) {
                    try {
                        var obj = JSON.parse(value);
                        $textarea.val(JSON.stringify(obj, null, 2));
                    } catch (e) {
                        // Leave as-is if not valid JSON
                    }
                }
            }

            // Update param display
            function updateParamDisplay() {
                var path = $('#node-input-path').val();
                var params = [];
                var paramRegex = /:([a-zA-Z_][a-zA-Z0-9_]*)/g;
                var match;
                while ((match = paramRegex.exec(path)) !== null) {
                    params.push(match[1]);
                }

                var $paramList = $('#param-list');
                $paramList.empty();

                if (params.length > 0) {
                    $('#param-display').show();
                    params.forEach(function(param) {
                        $paramList.append('<span class="param-badge">' + param + '</span> ');
                    });
                } else {
                    $('#param-display').hide();
                }

                // Validate path
                var validation = validatePath(path);
                var $pathInput = $('#node-input-path');
                var $pathError = $('#path-error');

                if (!validation.valid) {
                    $pathInput.addClass('input-error');
                    $pathError.text(validation.error).show();
                } else {
                    $pathInput.removeClass('input-error');
                    $pathError.hide();
                }
            }

            // Setup schema editor validation
            function setupSchemaValidation(textareaId, errorId) {
                $(textareaId).on('input change', function() {
                    var validation = validateJsonSchema($(this).val());
                    var $error = $(errorId);
                    if (!validation.valid) {
                        $(this).addClass('input-error');
                        $error.text(validation.error).show();
                    } else {
                        $(this).removeClass('input-error');
                        $error.hide();
                    }
                });
            }

            // Toggle validation section visibility
            function updateValidationVisibility() {
                var enabled = $('#node-input-validationEnabled').is(':checked');
                if (enabled) {
                    $('#validation-schemas').show();
                } else {
                    $('#validation-schemas').hide();
                }
            }

            // Initialize collapsible sections
            $('.schema-section-header').on('click', function() {
                var $content = $(this).next('.schema-section-content');
                var $icon = $(this).find('.section-toggle-icon');
                $content.slideToggle(200);
                $icon.toggleClass('fa-chevron-down fa-chevron-right');
            });

            // Event listeners
            $('#node-input-path').on('input change', updateParamDisplay);
            $('#node-input-validationEnabled').on('change', updateValidationVisibility);

            // Setup schema validation for each editor
            setupSchemaValidation('#node-input-bodySchema', '#body-schema-error');
            setupSchemaValidation('#node-input-querySchema', '#query-schema-error');
            setupSchemaValidation('#node-input-paramsSchema', '#params-schema-error');

            // Setup response schemas validation (different format - object with status codes as keys)
            $('#node-input-responseSchemas').on('input change', function() {
                var value = $(this).val().trim();
                var $error = $('#response-schemas-error');
                if (!value) {
                    $(this).removeClass('input-error');
                    $error.hide();
                    return;
                }
                try {
                    var schemas = JSON.parse(value);
                    if (typeof schemas !== 'object' || schemas === null || Array.isArray(schemas)) {
                        $(this).addClass('input-error');
                        $error.text('Must be an object mapping status codes to schemas').show();
                        return;
                    }
                    // Validate each status code
                    for (var statusCode in schemas) {
                        if (statusCode !== 'default' && !/^[1-5][0-9]{2}$/.test(statusCode)) {
                            $(this).addClass('input-error');
                            $error.text('Invalid status code: ' + statusCode).show();
                            return;
                        }
                        if (typeof schemas[statusCode] !== 'object' || schemas[statusCode] === null) {
                            $(this).addClass('input-error');
                            $error.text('Schema for ' + statusCode + ' must be an object').show();
                            return;
                        }
                    }
                    $(this).removeClass('input-error');
                    $error.hide();
                } catch (e) {
                    $(this).addClass('input-error');
                    $error.text('Invalid JSON: ' + e.message).show();
                }
            });

            // Format buttons
            $('#format-body-schema').on('click', function() {
                formatJson('#node-input-bodySchema');
            });
            $('#format-query-schema').on('click', function() {
                formatJson('#node-input-querySchema');
            });
            $('#format-params-schema').on('click', function() {
                formatJson('#node-input-paramsSchema');
            });
            $('#format-response-schemas').on('click', function() {
                formatJson('#node-input-responseSchemas');
            });

            // Update scope display
            function updateScopeDisplay() {
                var scopesStr = $('#node-input-requiredScopes').val();
                var scopes = scopesStr ? scopesStr.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; }) : [];

                var $scopeList = $('#scope-list');
                $scopeList.empty();

                if (scopes.length > 0) {
                    $('#scope-display').show();
                    var operator = $('#node-input-scopeOperator').val();
                    scopes.forEach(function(scope, index) {
                        $scopeList.append('<span class="scope-badge">' + scope + '</span>');
                        if (index < scopes.length - 1) {
                            $scopeList.append(' <span style="color: #666;">' + operator + '</span> ');
                        }
                    });
                } else {
                    $('#scope-display').hide();
                }
            }

            // Event listeners for scopes
            $('#node-input-requiredScopes').on('input change', updateScopeDisplay);
            $('#node-input-scopeOperator').on('change', updateScopeDisplay);

            // Toggle CRUD configuration visibility
            function updateCrudVisibility() {
                var operation = $('#node-input-crudOperation').val();
                if (operation && operation !== 'none') {
                    $('#crud-config').show();
                    updateSqlPreview();
                } else {
                    $('#crud-config').hide();
                }
            }

            // Toggle SQL preview based on auto-generate option
            function updateSqlPreview() {
                var autoGenerate = $('#node-input-autoGenerateSql').is(':checked');
                if (autoGenerate) {
                    $('#sql-preview-section').show();
                    generateSqlPreview();
                } else {
                    $('#sql-preview-section').hide();
                }
            }

            // Generate and display SQL preview
            function generateSqlPreview() {
                var operation = $('#node-input-crudOperation').val();
                var tableName = $('#node-input-tableName').val().trim() || '[table_name]';
                var primaryKey = $('#node-input-primaryKey').val().trim() || 'id';
                var sql = '';

                switch (operation) {
                    case 'list':
                        sql = 'SELECT * FROM ' + tableName;
                        break;
                    case 'get':
                        sql = 'SELECT * FROM ' + tableName + ' WHERE ' + primaryKey + ' = @' + primaryKey;
                        break;
                    case 'create':
                        sql = 'INSERT INTO ' + tableName + ' (@columns) VALUES (@values)';
                        break;
                    case 'update':
                        sql = 'UPDATE ' + tableName + ' SET @assignments WHERE ' + primaryKey + ' = @' + primaryKey;
                        break;
                    case 'delete':
                        sql = 'DELETE FROM ' + tableName + ' WHERE ' + primaryKey + ' = @' + primaryKey;
                        break;
                    default:
                        sql = '-- No operation selected';
                }

                $('#sql-preview').text(sql);
            }

            // Validate table name
            function validateTableName() {
                var tableName = $('#node-input-tableName').val().trim();
                var $error = $('#table-name-error');
                if (!tableName) {
                    $error.hide();
                    return;
                }
                if (!/^[a-zA-Z_][a-zA-Z0-9_]*(\.[a-zA-Z_][a-zA-Z0-9_]*)?$/.test(tableName)) {
                    $error.text('Invalid table name format').show();
                } else {
                    $error.hide();
                }
            }

            // Event listeners for CRUD
            $('#node-input-crudOperation').on('change', updateCrudVisibility);
            $('#node-input-autoGenerateSql').on('change', updateSqlPreview);
            $('#node-input-tableName').on('input change', function() {
                validateTableName();
                generateSqlPreview();
            });
            $('#node-input-primaryKey').on('input change', generateSqlPreview);

            // Toggle pagination configuration visibility
            function updatePaginationVisibility() {
                var enabled = $('#node-input-paginationEnabled').is(':checked');
                if (enabled) {
                    $('#pagination-config').show();
                } else {
                    $('#pagination-config').hide();
                }
            }

            // Validate pagination configuration
            function validatePaginationConfig() {
                var defaultSize = parseInt($('#node-input-defaultPageSize').val(), 10);
                var maxSize = parseInt($('#node-input-maxPageSize').val(), 10);
                var $defaultError = $('#default-page-size-error');
                var $maxError = $('#max-page-size-error');

                // Validate default page size
                if (isNaN(defaultSize) || defaultSize < 1) {
                    $defaultError.text('Must be a positive integer').show();
                } else {
                    $defaultError.hide();
                }

                // Validate max page size
                if (isNaN(maxSize) || maxSize < 1) {
                    $maxError.text('Must be a positive integer').show();
                } else if (!isNaN(defaultSize) && defaultSize > maxSize) {
                    $maxError.text('Must be >= default page size').show();
                } else {
                    $maxError.hide();
                }
            }

            // Event listeners for pagination
            $('#node-input-paginationEnabled').on('change', updatePaginationVisibility);
            $('#node-input-defaultPageSize').on('input change', validatePaginationConfig);
            $('#node-input-maxPageSize').on('input change', validatePaginationConfig);

            // Initial updates
            updateParamDisplay();
            updateValidationVisibility();
            updateScopeDisplay();
            updateCrudVisibility();
            updatePaginationVisibility();

            // Format existing schemas on open
            formatJson('#node-input-bodySchema');
            formatJson('#node-input-querySchema');
            formatJson('#node-input-paramsSchema');
            formatJson('#node-input-responseSchemas');
        },
        oneditsave: function() {
            // Normalize path on save
            var path = $('#node-input-path').val().trim();
            if (path && !path.startsWith('/')) {
                path = '/' + path;
            }
            if (path && path.length > 1 && path.endsWith('/')) {
                path = path.slice(0, -1);
            }
            this.path = path || '/';

            // Minify schemas on save to reduce storage
            var schemas = ['bodySchema', 'querySchema', 'paramsSchema', 'responseSchemas'];
            schemas.forEach(function(schema) {
                var value = $('#node-input-' + schema).val().trim();
                if (value) {
                    try {
                        var obj = JSON.parse(value);
                        $('#node-input-' + schema).val(JSON.stringify(obj));
                    } catch (e) {
                        // Leave as-is if not valid JSON
                    }
                }
            });
        }
    });
</script>

<script type="text/html" data-template-name="api-endpoint">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-method"><i class="fa fa-exchange"></i> Method</label>
        <select id="node-input-method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-path"><i class="fa fa-globe"></i> Path</label>
        <input type="text" id="node-input-path" placeholder="/users/:id">
        <div id="path-error" class="form-tips" style="color: #d9534f; display: none;"></div>
    </div>
    <div class="form-row" id="param-display" style="display: none;">
        <label><i class="fa fa-list"></i> Parameters</label>
        <div id="param-list" style="display: inline-block;"></div>
    </div>

    <hr>

    <div class="form-row">
        <label for="node-input-validationEnabled">
            <i class="fa fa-check-square"></i> Validation
        </label>
        <input type="checkbox" id="node-input-validationEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable request validation</span>
    </div>

    <div id="validation-schemas">
        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-file-code-o"></i> Request Body Schema
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-bodySchema" rows="8" placeholder='{"type": "object", "properties": {...}, "required": [...]}'></textarea>
                    <div id="body-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-body-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                        <i class="fa fa-indent"></i> Format
                    </button>
                </div>
            </div>
        </div>

        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-question-circle"></i> Query Parameters Schema
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-querySchema" rows="6" placeholder='{"type": "object", "properties": {"page": {"type": "integer"}, "limit": {"type": "integer"}}}'></textarea>
                    <div id="query-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-query-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                        <i class="fa fa-indent"></i> Format
                    </button>
                </div>
            </div>
        </div>

        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-link"></i> Path Parameters Schema
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-paramsSchema" rows="4" placeholder='{"type": "object", "properties": {"id": {"type": "integer"}}}'></textarea>
                    <div id="params-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-params-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                        <i class="fa fa-indent"></i> Format
                    </button>
                </div>
            </div>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-reply"></i> Response Configuration</label>
    </div>

    <div class="form-row">
        <label for="node-input-successStatusCode"><i class="fa fa-check-circle"></i> Success Code</label>
        <select id="node-input-successStatusCode" style="width: 120px;">
            <option value="200">200 OK</option>
            <option value="201">201 Created</option>
            <option value="202">202 Accepted</option>
            <option value="204">204 No Content</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-responseContentType"><i class="fa fa-file-text-o"></i> Content-Type</label>
        <select id="node-input-responseContentType" style="width: 200px;">
            <option value="application/json">application/json</option>
            <option value="application/xml">application/xml</option>
            <option value="text/plain">text/plain</option>
            <option value="text/html">text/html</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-validateResponseEnabled">
            <i class="fa fa-bug"></i> Dev Mode
        </label>
        <input type="checkbox" id="node-input-validateResponseEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Validate responses (for debugging)</span>
    </div>

    <div class="schema-section">
        <div class="schema-section-header">
            <i class="fa fa-chevron-down section-toggle-icon"></i>
            <i class="fa fa-reply"></i> Response Schemas
        </div>
        <div class="schema-section-content">
            <div class="form-tips" style="margin-bottom: 10px;">
                Define response schemas per status code. Use status codes as keys (e.g., "200", "404") or "default" for fallback.
            </div>
            <div class="form-row">
                <textarea id="node-input-responseSchemas" rows="10" placeholder='{
  "200": {
    "type": "object",
    "properties": {
      "id": { "type": "integer" },
      "name": { "type": "string" }
    }
  },
  "404": {
    "type": "object",
    "properties": {
      "error": { "type": "string" },
      "message": { "type": "string" }
    }
  }
}'></textarea>
                <div id="response-schemas-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                <button type="button" id="format-response-schemas" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                    <i class="fa fa-indent"></i> Format
                </button>
            </div>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-lock"></i> Authorization</label>
    </div>

    <div class="form-row">
        <label for="node-input-requiredScopes"><i class="fa fa-key"></i> Scopes</label>
        <input type="text" id="node-input-requiredScopes" placeholder="read:users, write:users, admin">
        <div class="form-tips" style="margin-top: 5px;">
            Comma-separated list of OAuth2 scopes required to access this endpoint.
        </div>
    </div>

    <div class="form-row">
        <label for="node-input-scopeOperator"><i class="fa fa-filter"></i> Operator</label>
        <select id="node-input-scopeOperator" style="width: 200px;">
            <option value="AND">AND (require all scopes)</option>
            <option value="OR">OR (require any scope)</option>
        </select>
    </div>

    <div id="scope-display" style="display: none; margin-left: 105px; margin-top: 5px;">
        <label style="width: auto;">Required scopes:</label>
        <div id="scope-list" style="display: inline-block;"></div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-database"></i> CRUD Mapping</label>
    </div>

    <div class="form-row">
        <label for="node-input-crudOperation"><i class="fa fa-cog"></i> Operation</label>
        <select id="node-input-crudOperation" style="width: 200px;">
            <option value="none">None (custom logic)</option>
            <option value="list">List (GET all)</option>
            <option value="get">Get (GET by ID)</option>
            <option value="create">Create (POST)</option>
            <option value="update">Update (PUT)</option>
            <option value="delete">Delete (DELETE)</option>
        </select>
    </div>

    <div id="crud-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-tableName"><i class="fa fa-table"></i> Table Name</label>
            <input type="text" id="node-input-tableName" placeholder="users">
            <div id="table-name-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-primaryKey"><i class="fa fa-key"></i> Primary Key</label>
            <input type="text" id="node-input-primaryKey" placeholder="id">
        </div>

        <div class="form-row">
            <label for="node-input-autoGenerateSql">
                <i class="fa fa-code"></i> Auto SQL
            </label>
            <input type="checkbox" id="node-input-autoGenerateSql" style="width: auto; margin-left: 5px;">
            <span style="margin-left: 5px;">Generate basic SQL template</span>
        </div>

        <div class="form-row">
            <label for="node-input-useFlowOutput">
                <i class="fa fa-share-alt"></i> Flow Output
            </label>
            <input type="checkbox" id="node-input-useFlowOutput" style="width: auto; margin-left: 5px;" checked>
            <span style="margin-left: 5px;">Delegate to flow for custom logic</span>
        </div>

        <div id="sql-preview-section" style="display: none; margin-top: 10px;">
            <div class="form-row">
                <label><i class="fa fa-file-code-o"></i> SQL Preview</label>
            </div>
            <div class="form-row" style="margin-left: 105px;">
                <pre id="sql-preview" style="background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-wrap: break-word;"></pre>
            </div>
            <div class="form-tips" style="margin-left: 105px;">
                <i class="fa fa-info-circle"></i> @columns, @values, and @assignments are placeholders filled from request body at runtime.
            </div>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-list-ol"></i> Pagination</label>
    </div>

    <div class="form-row">
        <label for="node-input-paginationEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-paginationEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable pagination for this endpoint</span>
    </div>

    <div id="pagination-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-paginationStyle"><i class="fa fa-sliders"></i> Style</label>
            <select id="node-input-paginationStyle" style="width: 200px;">
                <option value="offset">Offset-based (page, limit, offset)</option>
                <option value="cursor">Cursor-based (cursor, limit)</option>
            </select>
        </div>

        <div class="form-row">
            <label for="node-input-defaultPageSize"><i class="fa fa-file-text-o"></i> Default Size</label>
            <input type="number" id="node-input-defaultPageSize" min="1" style="width: 80px;" placeholder="20">
            <span style="margin-left: 5px; color: #666;">items per page</span>
            <div id="default-page-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-maxPageSize"><i class="fa fa-expand"></i> Max Size</label>
            <input type="number" id="node-input-maxPageSize" min="1" style="width: 80px;" placeholder="100">
            <span style="margin-left: 5px; color: #666;">maximum items per page</span>
            <div id="max-page-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> <b>Offset-based:</b> Uses <code>page</code>, <code>limit</code>, and <code>offset</code> query params.<br>
            <i class="fa fa-info-circle"></i> <b>Cursor-based:</b> Uses <code>cursor</code> and <code>limit</code> query params for efficient pagination of large datasets.
        </div>
    </div>

    <style>
        .param-badge {
            display: inline-block;
            padding: 2px 8px;
            margin: 2px;
            background-color: #5bc0de;
            color: white;
            border-radius: 3px;
            font-size: 12px;
            font-family: monospace;
        }
        .scope-badge {
            display: inline-block;
            padding: 2px 8px;
            margin: 2px;
            background-color: #f0ad4e;
            color: white;
            border-radius: 3px;
            font-size: 12px;
            font-family: monospace;
        }
        .input-error {
            border-color: #d9534f !important;
        }
        .schema-section {
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .schema-section-header {
            padding: 8px 12px;
            background-color: #f5f5f5;
            cursor: pointer;
            font-weight: bold;
        }
        .schema-section-header:hover {
            background-color: #e8e8e8;
        }
        .schema-section-header i {
            margin-right: 5px;
        }
        .section-toggle-icon {
            transition: transform 0.2s;
        }
        .schema-section-content {
            padding: 10px;
            border-top: 1px solid #ddd;
        }
        .schema-section-content textarea {
            width: 100%;
            font-family: monospace;

            resize: vertical;
        }
        #validation-schemas {
            margin-top: 10px;
        }
    </style>
</script>

<script type="text/html" data-help-name="api-endpoint">
    <p>Configures an API endpoint with path, HTTP method, and request validation for the API Gateway.</p>

    <h3>Properties</h3>
    <dl class="message-properties">
        <dt>Server
            <span class="property-type">api-server</span>
        </dt>
        <dd>Reference to the API Server configuration node that will handle this endpoint.</dd>

        <dt>Method
            <span class="property-type">string</span>
        </dt>
        <dd>The HTTP method for this endpoint: GET, POST, PUT, DELETE, or PATCH.</dd>

        <dt>Path
            <span class="property-type">string</span>
        </dt>
        <dd>The URL path pattern for this endpoint. Supports path parameters using colon notation
            (e.g., <code>/users/:id</code>).</dd>

        <dt>Validation
            <span class="property-type">boolean</span>
        </dt>
        <dd>Enable or disable request validation. When enabled, requests are validated against the defined schemas.</dd>

        <dt>Request Body Schema
            <span class="property-type">JSON Schema</span>
        </dt>
        <dd>JSON Schema to validate the request body (typically for POST, PUT, PATCH requests).</dd>

        <dt>Query Parameters Schema
            <span class="property-type">JSON Schema</span>
        </dt>
        <dd>JSON Schema to validate query string parameters. Type coercion is automatically applied.</dd>

        <dt>Path Parameters Schema
            <span class="property-type">JSON Schema</span>
        </dt>
        <dd>JSON Schema to validate path parameters. Type coercion is automatically applied.</dd>

        <dt>Success Code
            <span class="property-type">number</span>
        </dt>
        <dd>The HTTP status code for successful responses (200, 201, 202, or 204).</dd>

        <dt>Content-Type
            <span class="property-type">string</span>
        </dt>
        <dd>The Content-Type header for responses (e.g., application/json, application/xml).</dd>

        <dt>Dev Mode
            <span class="property-type">boolean</span>
        </dt>
        <dd>Enable response validation for debugging. When enabled, outgoing responses are validated against the response schemas.</dd>

        <dt>Response Schemas
            <span class="property-type">object</span>
        </dt>
        <dd>JSON object mapping HTTP status codes to JSON Schemas. Used for OpenAPI generation and optional response validation.</dd>

        <dt>Required Scopes
            <span class="property-type">string</span>
        </dt>
        <dd>Comma-separated list of OAuth2 scopes required to access this endpoint. When configured, requests without valid scopes will receive 401 (unauthenticated) or 403 (insufficient permissions) responses.</dd>

        <dt>Scope Operator
            <span class="property-type">string</span>
        </dt>
        <dd>Controls how multiple scopes are evaluated: <b>AND</b> requires all scopes to be present, <b>OR</b> requires at least one scope.</dd>

        <dt>CRUD Operation
            <span class="property-type">string</span>
        </dt>
        <dd>Maps this endpoint to a database CRUD operation: <b>list</b> (GET all), <b>get</b> (GET by ID), <b>create</b> (POST), <b>update</b> (PUT), or <b>delete</b> (DELETE).</dd>

        <dt>Table Name
            <span class="property-type">string</span>
        </dt>
        <dd>Database table name for the CRUD operation. Supports schema.table notation (e.g., <code>public.users</code>).</dd>

        <dt>Primary Key
            <span class="property-type">string</span>
        </dt>
        <dd>Primary key column name for get, update, and delete operations. Defaults to <code>id</code>.</dd>

        <dt>Auto SQL
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, generates basic SQL templates that are added to <code>msg.crud.sql</code>.</dd>

        <dt>Flow Output
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, delegates database operations to the flow for custom business logic. The CRUD context is passed in <code>msg.crud</code>.</dd>

        <dt>Enable Pagination
            <span class="property-type">boolean</span>
        </dt>
        <dd>When enabled, the endpoint parses pagination parameters from query string and provides pagination context in <code>msg.pagination</code>.</dd>

        <dt>Pagination Style
            <span class="property-type">string</span>
        </dt>
        <dd>Choose between <b>offset</b> (uses page/limit/offset params) or <b>cursor</b> (uses cursor/limit params) pagination.</dd>

        <dt>Default Page Size
            <span class="property-type">number</span>
        </dt>
        <dd>The default number of items per page when no limit is specified. Default is 20.</dd>

        <dt>Max Page Size
            <span class="property-type">number</span>
        </dt>
        <dd>The maximum number of items allowed per page. Requests for larger limits are capped at this value. Default is 100.</dd>
    </dl>

    <h3>Path Parameters</h3>
    <p>Path parameters are defined using a colon followed by the parameter name. For example:</p>
    <ul>
        <li><code>/users/:id</code> - captures a user ID</li>
        <li><code>/posts/:postId/comments/:commentId</code> - captures both post and comment IDs</li>
    </ul>

    <h3>Schema Validation</h3>
    <p>Request validation uses JSON Schema (draft-07). Common formats are supported:</p>
    <ul>
        <li><code>email</code> - validates email addresses</li>
        <li><code>uri</code> - validates URIs</li>
        <li><code>date-time</code> - validates ISO 8601 date-times</li>
        <li><code>uuid</code> - validates UUIDs</li>
    </ul>

    <h3>Example Body Schema</h3>
    <pre>{
  "type": "object",
  "properties": {
    "name": { "type": "string", "minLength": 1 },
    "email": { "type": "string", "format": "email" },
    "age": { "type": "integer", "minimum": 0 }
  },
  "required": ["name", "email"]
}</pre>

    <h3>Response Schema Configuration</h3>
    <p>Response schemas define the expected format of API responses for different status codes.
    They are used for:</p>
    <ul>
        <li>OpenAPI specification generation</li>
        <li>Optional response validation in development mode</li>
        <li>API documentation</li>
    </ul>

    <h3>Example Response Schemas</h3>
    <pre>{
  "200": {
    "type": "object",
    "properties": {
      "id": { "type": "integer" },
      "name": { "type": "string" },
      "email": { "type": "string", "format": "email" }
    },
    "required": ["id", "name"]
  },
  "404": {
    "type": "object",
    "properties": {
      "error": { "type": "string" },
      "message": { "type": "string" }
    }
  },
  "default": {
    "type": "object",
    "properties": {
      "error": { "type": "string" }
    }
  }
}</pre>

    <h3>Validation Errors</h3>
    <p>When validation fails:</p>
    <ul>
        <li>If <code>msg.res</code> is available, a 400 Bad Request response is automatically sent</li>
        <li>The error details are added to <code>msg.validationError</code></li>
        <li>The error response includes the path, message, and details for each validation failure</li>
    </ul>

    <h3>Authorization</h3>
    <p>When required scopes are configured, the endpoint checks authorization before processing requests:</p>
    <ul>
        <li><b>401 Unauthorized</b>: Returned when <code>msg.req.auth.authenticated</code> is not set (user not logged in)</li>
        <li><b>403 Forbidden</b>: Returned when the user's scopes don't satisfy the required scopes</li>
    </ul>
    <p>The authorization check expects scopes to be provided in <code>msg.req.auth.scopes</code> as an array of strings.</p>

    <h3>Example Authorization Configuration</h3>
    <p>For an endpoint requiring admin access:</p>
    <ul>
        <li>Required Scopes: <code>admin:read, admin:write</code></li>
        <li>Operator: <b>AND</b> - User must have both scopes</li>
    </ul>
    <p>For an endpoint accessible by multiple roles:</p>
    <ul>
        <li>Required Scopes: <code>admin, moderator, owner</code></li>
        <li>Operator: <b>OR</b> - User needs at least one scope</li>
    </ul>

    <h3>CRUD Operation Mapping</h3>
    <p>The CRUD mapping feature allows you to map HTTP endpoints to database operations. When configured:</p>
    <ul>
        <li>A <code>msg.crud</code> object is added with operation details</li>
        <li>When Auto SQL is enabled, SQL templates are generated</li>
        <li>The flow can use this context to execute database operations</li>
    </ul>

    <h3>CRUD Operations</h3>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
        <tr style="background: #f5f5f5;">
            <th style="padding: 8px; border: 1px solid #ddd;">Operation</th>
            <th style="padding: 8px; border: 1px solid #ddd;">HTTP Method</th>
            <th style="padding: 8px; border: 1px solid #ddd;">SQL Template</th>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>list</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">GET</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>SELECT * FROM table</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>get</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">GET</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>SELECT * FROM table WHERE pk = @pk</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>create</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">POST</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>INSERT INTO table (@columns) VALUES (@values)</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>update</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">PUT</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>UPDATE table SET @assignments WHERE pk = @pk</code></td>
        </tr>
        <tr>
            <td style="padding: 8px; border: 1px solid #ddd;"><b>delete</b></td>
            <td style="padding: 8px; border: 1px solid #ddd;">DELETE</td>
            <td style="padding: 8px; border: 1px solid #ddd;"><code>DELETE FROM table WHERE pk = @pk</code></td>
        </tr>
    </table>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>req.body <span class="property-type">any</span></dt>
        <dd>Request body to validate against the body schema.</dd>
        <dt>req.query <span class="property-type">object</span></dt>
        <dd>Query parameters to validate against the query schema.</dd>
        <dt>req.params <span class="property-type">object</span></dt>
        <dd>Path parameters to validate against the params schema.</dd>
        <dt>req.auth.authenticated <span class="property-type">boolean</span></dt>
        <dd>Whether the request is authenticated (populated by upstream auth middleware).</dd>
        <dt>req.auth.scopes <span class="property-type">array</span></dt>
        <dd>Array of OAuth2 scope strings associated with the authenticated user/token.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>endpoint <span class="property-type">object</span></dt>
        <dd>Endpoint metadata including path, method, paramNames, validationEnabled, successStatusCode, responseContentType, validateResponseEnabled, requiredScopes, scopeOperator, and CRUD configuration.</dd>
        <dt>validationError <span class="property-type">object</span></dt>
        <dd>Present only when validation fails. Contains statusCode, error, message, and details.</dd>
        <dt>authorizationError <span class="property-type">object</span></dt>
        <dd>Present only when authorization fails. Contains statusCode (401 or 403), error, message, and details including requiredScopes, scopeOperator, and missingScopes.</dd>
        <dt>crud <span class="property-type">object</span></dt>
        <dd>Present when a CRUD operation is configured. Contains <code>operation</code>, <code>tableName</code>, <code>primaryKey</code>, and optionally <code>sql</code> (when Auto SQL is enabled) with the generated SQL template.</dd>
        <dt>pagination <span class="property-type">object</span></dt>
        <dd>Present when pagination is enabled and query params exist. Contains parsed pagination parameters based on the configured style.</dd>
    </dl>

    <h3>Pagination Support</h3>
    <p>When pagination is enabled, the endpoint automatically parses pagination parameters from the query string and adds them to <code>msg.pagination</code>.</p>

    <h4>Offset-Based Pagination</h4>
    <p>Uses traditional page-based navigation with the following query parameters:</p>
    <ul>
        <li><code>page</code> - Page number (1-indexed)</li>
        <li><code>limit</code> - Number of items per page</li>
        <li><code>offset</code> - Number of items to skip (alternative to page)</li>
    </ul>
    <p>The <code>msg.pagination</code> object contains:</p>
    <pre>{
  "style": "offset",
  "page": 1,
  "limit": 20,
  "offset": 0,
  "cursor": null
}</pre>

    <h4>Cursor-Based Pagination</h4>
    <p>Uses opaque cursors for efficient pagination of large datasets:</p>
    <ul>
        <li><code>cursor</code> - Opaque cursor string from previous response</li>
        <li><code>limit</code> - Number of items per page</li>
    </ul>
    <p>The <code>msg.pagination</code> object contains:</p>
    <pre>{
  "style": "cursor",
  "limit": 20,
  "cursor": "eyJpZCI6MTAwfQ==",
  "page": null,
  "offset": null
}</pre>

    <h4>Generating Response Metadata</h4>
    <p>Use the <code>generatePaginationMeta()</code> method to create pagination metadata for your response:</p>
    <pre>// In a function node after database query
const meta = node.context().flow.get('endpointNode').generatePaginationMeta(
  msg.pagination,
  {
    total: 150,     // Total item count (optional for cursor-based)
    count: 20,      // Items in current page
    nextCursor: 'eyJpZCI6MTIwfQ==',  // For cursor-based
    prevCursor: 'eyJpZCI6ODB9'       // For cursor-based
  }
);</pre>

    <h3>Methods Available</h3>
    <p>The node provides several methods for use by other nodes:</p>
    <dl class="message-properties">
        <dt>validateResponseData(statusCode, data)</dt>
        <dd>Validates response data against the schema for the given status code. Returns a ValidationResult.</dd>
        <dt>getResponseSchema(statusCode)</dt>
        <dd>Returns the JSON Schema for the given status code, or the default schema if not found.</dd>
        <dt>getOpenApiResponses()</dt>
        <dd>Returns response definitions in OpenAPI format for documentation generation.</dd>
        <dt>checkAuthorization(tokenScopes)</dt>
        <dd>Checks if the provided token scopes satisfy the endpoint's required scopes. Returns <code>{authorized: boolean, missingScopes: array}</code>.</dd>
        <dt>getOpenApiSecurity()</dt>
        <dd>Returns OpenAPI security requirements for this endpoint (OAuth2 scopes). Returns an empty array if no scopes are required.</dd>
        <dt>getCrudSql()</dt>
        <dd>Returns the generated SQL template object when Auto SQL is enabled. Returns <code>null</code> if no CRUD operation or Auto SQL is disabled.</dd>
        <dt>getCrudInfo()</dt>
        <dd>Returns the CRUD operation configuration: <code>{operation, tableName, primaryKey, autoGenerateSql, useFlowOutput, hasCrudOperation}</code>.</dd>
        <dt>getPaginationConfig()</dt>
        <dd>Returns the pagination configuration: <code>{enabled, defaultPageSize, maxPageSize, style}</code>.</dd>
        <dt>parsePagination(query)</dt>
        <dd>Parses pagination parameters from a query object. Returns <code>null</code> if pagination is disabled, otherwise returns the parsed pagination params.</dd>
        <dt>generatePaginationMeta(params, resultInfo)</dt>
        <dd>Generates pagination metadata for responses. Pass the parsed pagination params and result info (total, count, nextCursor, prevCursor). Returns metadata object with hasNext, hasPrev, etc.</dd>
    </dl>
</script>
