<script type="text/javascript" src="resources/@oriolrius/node-red-api-gateway/api-endpoint-editor.js"></script>
<script type="text/javascript">
    RED.nodes.registerType('api-endpoint', {
        category: 'API Gateway',
        color: '#87CEEB',
        defaults: {
            name: { value: "" },
            server: { value: "" },
            path: { value: "/", required: true },
            method: { value: "GET", required: true },
            validationEnabled: { value: true },
            bodySchema: { value: "" },
            querySchema: { value: "" },
            paramsSchema: { value: "" },
            // Response configuration
            successStatusCode: { value: "200" },
            responseContentType: { value: "application/json" },
            responseSchemas: { value: "" },
            validateResponseEnabled: { value: false },
            // Authorization configuration
            requiredScopes: { value: "" },
            scopeOperator: { value: "AND" },
            // CRUD operation mapping
            crudOperation: { value: "none" },
            tableName: { value: "" },
            primaryKey: { value: "id" },
            autoGenerateSql: { value: false },
            useFlowOutput: { value: true },
            // Pagination
            paginationEnabled: { value: false },
            defaultPageSize: { value: "20" },
            maxPageSize: { value: "100" },
            paginationStyle: { value: "offset" },
            // Filtering
            filteringEnabled: { value: false },
            filterableFields: { value: "" },
            // Sorting
            sortingEnabled: { value: false },
            sortableFields: { value: "" },
            defaultSortField: { value: "" },
            defaultSortDirection: { value: "asc" },
            // Transformation
            transformationEnabled: { value: false },
            requestTransformExpression: { value: "" },
            responseTransformExpression: { value: "" },
            fieldMappings: { value: "" },
            // Rate Limiting
            rateLimitingEnabled: { value: false },
            rateLimitRequests: { value: "100" },
            rateLimitWindowMs: { value: "60000" },
            rateLimitKeyType: { value: "ip" },
            rateLimitCustomKeyPath: { value: "" },
            // Caching
            cachingEnabled: { value: false },
            cacheTTL: { value: "300000" },
            cacheMaxSize: { value: "100" },
            cacheKeyStrategy: { value: "full" },
            cacheKeyExpression: { value: "" },
            cacheVaryHeaders: { value: "" },
            cachePrivate: { value: false },
            // Error Handling
            errorHandlingEnabled: { value: true },
            errorFormat: { value: "rfc7807" },
            includeStackTrace: { value: false },
            logErrors: { value: true },
            customErrorCodes: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-plug",
        label: function() {
            if (this.name) {
                return this.name;
            }
            if (this.path && this.method) {
                return this.method + " " + this.path;
            }
            return "API endpoint";
        },
        paletteLabel: "API endpoint",
        oneditprepare: function() {
            var node = this;
            var E = window.ApiEndpointEditor;

            // Populate server dropdown with available api-server nodes
            var $serverSelect = $('#node-input-server');
            $serverSelect.find('option:not(:first)').remove();
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'api-server') {
                    var label = config.name || ('API server:' + (config.port || 3000));
                    var selected = (node.server === config.id) ? ' selected' : '';
                    $serverSelect.append('<option value="' + config.id + '"' + selected + '>' + label + '</option>');
                }
            });
            // Also check regular nodes (api-server is not a config node)
            RED.nodes.eachNode(function(n) {
                if (n.type === 'api-server') {
                    var label = n.name || ('API server:' + (n.port || 3000));
                    var selected = (node.server === n.id) ? ' selected' : '';
                    $serverSelect.append('<option value="' + n.id + '"' + selected + '>' + label + '</option>');
                }
            });

            // Update param display
            function updateParamDisplay() {
                var path = $('#node-input-path').val();
                var params = E.extractParams(path);
                var $paramList = $('#param-list');
                $paramList.empty();

                if (params.length > 0) {
                    $('#param-display').show();
                    E.renderBadges('#param-list', params, 'param-badge');
                } else {
                    $('#param-display').hide();
                }

                // Validate path
                var validation = E.validatePath(path);
                var $pathInput = $('#node-input-path');
                var $pathError = $('#path-error');

                if (!validation.valid) {
                    $pathInput.addClass('input-error');
                    $pathError.text(validation.error).show();
                } else {
                    $pathInput.removeClass('input-error');
                    $pathError.hide();
                }
            }

            // Initialize collapsible sections
            $('.schema-section-header').on('click', function() {
                var $content = $(this).next('.schema-section-content');
                var $icon = $(this).find('.section-toggle-icon');
                $content.slideToggle(200);
                $icon.toggleClass('fa-chevron-down fa-chevron-right');
            });

            // Event listeners
            $('#node-input-path').on('input change', updateParamDisplay);

            // Validation visibility toggle
            E.setupToggle('#node-input-validationEnabled', '#validation-schemas');

            // Setup schema validation
            E.setupValidation('#node-input-bodySchema', '#body-schema-error', E.validateJsonSchema);
            E.setupValidation('#node-input-querySchema', '#query-schema-error', E.validateJsonSchema);
            E.setupValidation('#node-input-paramsSchema', '#params-schema-error', E.validateJsonSchema);
            E.setupValidation('#node-input-responseSchemas', '#response-schemas-error', E.validateResponseSchemas);

            // Format buttons
            $('#format-body-schema').on('click', function() { E.formatJson('#node-input-bodySchema'); });
            $('#format-query-schema').on('click', function() { E.formatJson('#node-input-querySchema'); });
            $('#format-params-schema').on('click', function() { E.formatJson('#node-input-paramsSchema'); });
            $('#format-response-schemas').on('click', function() { E.formatJson('#node-input-responseSchemas'); });

            // Update scope display
            function updateScopeDisplay() {
                var scopes = E.parseScopes($('#node-input-requiredScopes').val());
                if (scopes.length > 0) {
                    $('#scope-display').show();
                    var operator = $('#node-input-scopeOperator').val();
                    E.renderScopeBadges('#scope-list', scopes, operator);
                } else {
                    $('#scope-display').hide();
                }
            }

            $('#node-input-requiredScopes').on('input change', updateScopeDisplay);
            $('#node-input-scopeOperator').on('change', updateScopeDisplay);

            // CRUD visibility and SQL preview
            function updateCrudVisibility() {
                var operation = $('#node-input-crudOperation').val();
                if (operation && operation !== 'none') {
                    $('#crud-config').show();
                    updateSqlPreview();
                } else {
                    $('#crud-config').hide();
                }
            }

            function updateSqlPreview() {
                var autoGenerate = $('#node-input-autoGenerateSql').is(':checked');
                if (autoGenerate) {
                    $('#sql-preview-section').show();
                    var sql = E.generateSqlPreview(
                        $('#node-input-crudOperation').val(),
                        $('#node-input-tableName').val().trim(),
                        $('#node-input-primaryKey').val().trim()
                    );
                    $('#sql-preview').text(sql);
                } else {
                    $('#sql-preview-section').hide();
                }
            }

            function validateTableName() {
                var validation = E.validateTableName($('#node-input-tableName').val());
                var $error = $('#table-name-error');
                if (!validation.valid) {
                    $error.text(validation.error).show();
                } else {
                    $error.hide();
                }
            }

            $('#node-input-crudOperation').on('change', updateCrudVisibility);
            $('#node-input-autoGenerateSql').on('change', updateSqlPreview);
            $('#node-input-tableName').on('input change', function() {
                validateTableName();
                updateSqlPreview();
            });
            $('#node-input-primaryKey').on('input change', updateSqlPreview);

            // Pagination
            E.setupToggle('#node-input-paginationEnabled', '#pagination-config');

            function validatePaginationConfig() {
                var defaultSize = parseInt($('#node-input-defaultPageSize').val(), 10);
                var maxSize = parseInt($('#node-input-maxPageSize').val(), 10);
                var $defaultError = $('#default-page-size-error');
                var $maxError = $('#max-page-size-error');

                if (isNaN(defaultSize) || defaultSize < 1) {
                    $defaultError.text('Must be a positive integer').show();
                } else {
                    $defaultError.hide();
                }

                if (isNaN(maxSize) || maxSize < 1) {
                    $maxError.text('Must be a positive integer').show();
                } else if (!isNaN(defaultSize) && defaultSize > maxSize) {
                    $maxError.text('Must be >= default page size').show();
                } else {
                    $maxError.hide();
                }
            }

            $('#node-input-defaultPageSize').on('input change', validatePaginationConfig);
            $('#node-input-maxPageSize').on('input change', validatePaginationConfig);

            // Filtering and Sorting
            E.setupToggle('#node-input-filteringEnabled', '#filtering-config');
            E.setupToggle('#node-input-sortingEnabled', '#sorting-config');

            function updateFilterableFieldsDisplay() {
                var fields = E.parseFieldList($('#node-input-filterableFields').val());
                E.renderBadges('#filterable-fields-display', fields, 'field-badge');
            }

            function updateSortableFieldsDisplay() {
                var fields = E.parseFieldList($('#node-input-sortableFields').val());
                E.renderBadges('#sortable-fields-display', fields, 'field-badge');
            }

            $('#node-input-filterableFields').on('input change', updateFilterableFieldsDisplay);
            $('#node-input-sortableFields').on('input change', updateSortableFieldsDisplay);

            // Transformation
            E.setupToggle('#node-input-transformationEnabled', '#transformation-config');
            E.setupValidation('#node-input-requestTransformExpression', '#request-transform-error', E.validateJsonataExpression);
            E.setupValidation('#node-input-responseTransformExpression', '#response-transform-error', E.validateJsonataExpression);
            E.setupValidation('#node-input-fieldMappings', '#field-mappings-error', E.validateFieldMappings);

            function updateFieldMappingsDisplay() {
                var mappings = E.parseFieldMappings($('#node-input-fieldMappings').val());
                E.renderMappingBadges('#field-mappings-display', mappings);
            }

            $('#node-input-fieldMappings').on('input change', updateFieldMappingsDisplay);

            // Rate Limiting
            function updateRateLimitingVisibility() {
                var enabled = $('#node-input-rateLimitingEnabled').is(':checked');
                if (enabled) {
                    $('#rate-limiting-config').show();
                } else {
                    $('#rate-limiting-config').hide();
                }
                updateCustomKeyPathVisibility();
            }

            function updateCustomKeyPathVisibility() {
                var keyType = $('#node-input-rateLimitKeyType').val();
                if (keyType === 'custom') {
                    $('#custom-key-path-row').show();
                } else {
                    $('#custom-key-path-row').hide();
                }
            }

            function validateRateLimitConfig() {
                var requests = parseInt($('#node-input-rateLimitRequests').val(), 10);
                var windowMs = parseInt($('#node-input-rateLimitWindowMs').val(), 10);
                var $requestsError = $('#rate-limit-requests-error');
                var $windowError = $('#rate-limit-window-error');

                if (isNaN(requests) || requests < 1) {
                    $requestsError.text('Must be a positive integer').show();
                } else {
                    $requestsError.hide();
                }

                if (isNaN(windowMs) || windowMs < 1000) {
                    $windowError.text('Must be at least 1000ms (1 second)').show();
                } else {
                    $windowError.hide();
                }
            }

            $('#node-input-rateLimitingEnabled').on('change', updateRateLimitingVisibility);
            $('#node-input-rateLimitKeyType').on('change', updateCustomKeyPathVisibility);
            $('#node-input-rateLimitRequests').on('input change', validateRateLimitConfig);
            $('#node-input-rateLimitWindowMs').on('input change', validateRateLimitConfig);

            // Caching
            function updateCachingVisibility() {
                var enabled = $('#node-input-cachingEnabled').is(':checked');
                if (enabled) {
                    $('#caching-config').show();
                } else {
                    $('#caching-config').hide();
                }
                updateCacheKeyExpressionVisibility();
            }

            function updateCacheKeyExpressionVisibility() {
                var keyStrategy = $('#node-input-cacheKeyStrategy').val();
                if (keyStrategy === 'custom') {
                    $('#cache-key-expression-row').show();
                } else {
                    $('#cache-key-expression-row').hide();
                }
            }

            function validateCachingConfig() {
                var ttl = parseInt($('#node-input-cacheTTL').val(), 10);
                var maxSize = parseInt($('#node-input-cacheMaxSize').val(), 10);
                var $ttlError = $('#cache-ttl-error');
                var $sizeError = $('#cache-size-error');

                if (isNaN(ttl) || ttl < 0) {
                    $ttlError.text('Must be a non-negative integer (0 = no expiry)').show();
                } else {
                    $ttlError.hide();
                }

                if (isNaN(maxSize) || maxSize < 1) {
                    $sizeError.text('Must be a positive integer').show();
                } else {
                    $sizeError.hide();
                }
            }

            function updateVaryHeadersDisplay() {
                var varyHeaders = $('#node-input-cacheVaryHeaders').val() || '';
                var headers = varyHeaders.split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h.length > 0; });
                E.renderBadges('#vary-headers-display', headers, 'field-badge');
            }

            $('#node-input-cachingEnabled').on('change', updateCachingVisibility);
            $('#node-input-cacheKeyStrategy').on('change', updateCacheKeyExpressionVisibility);
            $('#node-input-cacheTTL').on('input change', validateCachingConfig);
            $('#node-input-cacheMaxSize').on('input change', validateCachingConfig);
            $('#node-input-cacheVaryHeaders').on('input change', updateVaryHeadersDisplay);

            // Error Handling
            E.setupToggle('#node-input-errorHandlingEnabled', '#error-handling-options');

            function validateCustomErrorCodes() {
                var validation = E.validateCustomErrorCodes($('#node-input-customErrorCodes').val());
                var $warning = $('#custom-error-codes-warning');
                if (!validation.valid) {
                    $warning.text(validation.error).show();
                    return false;
                }
                $warning.hide();
                return true;
            }

            $('#node-input-customErrorCodes').on('input change', validateCustomErrorCodes);

            // Initial updates
            updateParamDisplay();
            $('#node-input-validationEnabled').trigger('change');
            updateScopeDisplay();
            updateCrudVisibility();
            $('#node-input-paginationEnabled').trigger('change');
            $('#node-input-filteringEnabled').trigger('change');
            $('#node-input-sortingEnabled').trigger('change');
            updateFilterableFieldsDisplay();
            updateSortableFieldsDisplay();
            $('#node-input-transformationEnabled').trigger('change');
            updateFieldMappingsDisplay();
            updateRateLimitingVisibility();
            updateCachingVisibility();
            updateVaryHeadersDisplay();
            $('#node-input-errorHandlingEnabled').trigger('change');
            validateCustomErrorCodes();

            // Format existing schemas on open
            E.formatJson('#node-input-bodySchema');
            E.formatJson('#node-input-querySchema');
            E.formatJson('#node-input-paramsSchema');
            E.formatJson('#node-input-responseSchemas');
        },
        oneditsave: function() {
            var E = window.ApiEndpointEditor;

            // Normalize path on save
            this.path = E.normalizePath($('#node-input-path').val());

            // Minify schemas on save to reduce storage
            var schemas = ['bodySchema', 'querySchema', 'paramsSchema', 'responseSchemas'];
            schemas.forEach(function(schema) {
                E.minifyJson('#node-input-' + schema);
            });
        }
    });
</script>

<script type="text/html" data-template-name="api-endpoint">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <select id="node-input-server" style="width: 70%;">
            <option value="">-- Select API Server --</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-method"><i class="fa fa-exchange"></i> Method</label>
        <select id="node-input-method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-path"><i class="fa fa-globe"></i> Path</label>
        <input type="text" id="node-input-path" placeholder="/users/:id">
        <div id="path-error" class="form-tips" style="color: #d9534f; display: none;"></div>
    </div>
    <div class="form-row" id="param-display" style="display: none;">
        <label><i class="fa fa-puzzle-piece"></i> Params</label>
        <div id="param-list" style="display: inline;"></div>
    </div>

    <!-- Validation Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-check-circle"></i> Request Validation
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-validationEnabled"><i class="fa fa-shield"></i> Enable</label>
        <input type="checkbox" id="node-input-validationEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable request validation</span>
    </div>

    <div id="validation-schemas">
        <!-- Body Schema -->
        <div class="schema-section">
            <div class="schema-section-header" style="cursor: pointer; padding: 5px; background: #f5f5f5; border-radius: 3px;">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <span>Body Schema (JSON Schema)</span>
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-bodySchema" rows="6" placeholder='{"type": "object", "properties": {...}}' style="width: 100%; font-family: monospace; font-size: 11px;"></textarea>
                    <div id="body-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-body-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">Format JSON</button>
                </div>
            </div>
        </div>

        <!-- Query Schema -->
        <div class="schema-section">
            <div class="schema-section-header" style="cursor: pointer; padding: 5px; background: #f5f5f5; border-radius: 3px; margin-top: 10px;">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <span>Query Schema (JSON Schema)</span>
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-querySchema" rows="4" placeholder='{"type": "object", "properties": {"page": {"type": "integer"}}}' style="width: 100%; font-family: monospace; font-size: 11px;"></textarea>
                    <div id="query-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-query-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">Format JSON</button>
                </div>
            </div>
        </div>

        <!-- Params Schema -->
        <div class="schema-section">
            <div class="schema-section-header" style="cursor: pointer; padding: 5px; background: #f5f5f5; border-radius: 3px; margin-top: 10px;">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <span>Path Params Schema (JSON Schema)</span>
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-paramsSchema" rows="4" placeholder='{"type": "object", "properties": {"id": {"type": "integer"}}}' style="width: 100%; font-family: monospace; font-size: 11px;"></textarea>
                    <div id="params-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-params-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">Format JSON</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Response Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-reply"></i> Response Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-successStatusCode"><i class="fa fa-hashtag"></i> Status</label>
        <select id="node-input-successStatusCode">
            <option value="200">200 OK</option>
            <option value="201">201 Created</option>
            <option value="202">202 Accepted</option>
            <option value="204">204 No Content</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-responseContentType"><i class="fa fa-file-text"></i> Content-Type</label>
        <select id="node-input-responseContentType">
            <option value="application/json">application/json</option>
            <option value="application/xml">application/xml</option>
            <option value="text/plain">text/plain</option>
            <option value="text/html">text/html</option>
        </select>
    </div>

    <!-- Response Schemas -->
    <div class="schema-section">
        <div class="schema-section-header" style="cursor: pointer; padding: 5px; background: #f5f5f5; border-radius: 3px; margin-top: 10px;">
            <i class="fa fa-chevron-down section-toggle-icon"></i>
            <span>Response Schemas (by Status Code)</span>
        </div>
        <div class="schema-section-content">
            <div class="form-row">
                <textarea id="node-input-responseSchemas" rows="6" placeholder='{"200": {"type": "object", ...}, "404": {"type": "object", ...}}' style="width: 100%; font-family: monospace; font-size: 11px;"></textarea>
                <div id="response-schemas-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                <button type="button" id="format-response-schemas" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">Format JSON</button>
            </div>
            <div class="form-row">
                <label for="node-input-validateResponseEnabled"><i class="fa fa-bug"></i> Dev Mode</label>
                <input type="checkbox" id="node-input-validateResponseEnabled" style="width: auto;">
                <span style="margin-left: 5px;">Validate response data against schema (development only)</span>
            </div>
        </div>
    </div>

    <!-- Authorization Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-lock"></i> Authorization
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-requiredScopes"><i class="fa fa-key"></i> Scopes</label>
        <input type="text" id="node-input-requiredScopes" placeholder="read:users, write:posts">
    </div>
    <div class="form-row" id="scope-display" style="display: none;">
        <label>&nbsp;</label>
        <div id="scope-list" style="display: inline;"></div>
    </div>
    <div class="form-row">
        <label for="node-input-scopeOperator"><i class="fa fa-code-fork"></i> Operator</label>
        <select id="node-input-scopeOperator">
            <option value="AND">AND (all required)</option>
            <option value="OR">OR (any required)</option>
        </select>
    </div>

    <!-- CRUD Operation Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-database"></i> CRUD Operation
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-crudOperation"><i class="fa fa-cog"></i> Operation</label>
        <select id="node-input-crudOperation">
            <option value="none">None (custom logic)</option>
            <option value="list">List (GET collection)</option>
            <option value="get">Get (GET single)</option>
            <option value="create">Create (POST)</option>
            <option value="update">Update (PUT/PATCH)</option>
            <option value="delete">Delete (DELETE)</option>
        </select>
    </div>

    <div id="crud-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-tableName"><i class="fa fa-table"></i> Table</label>
            <input type="text" id="node-input-tableName" placeholder="users">
            <div id="table-name-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-primaryKey"><i class="fa fa-key"></i> Primary Key</label>
            <input type="text" id="node-input-primaryKey" placeholder="id">
        </div>
        <div class="form-row">
            <label for="node-input-autoGenerateSql"><i class="fa fa-magic"></i> Auto SQL</label>
            <input type="checkbox" id="node-input-autoGenerateSql" style="width: auto;">
            <span style="margin-left: 5px;">Auto-generate SQL template</span>
        </div>
        <div class="form-row">
            <label for="node-input-useFlowOutput"><i class="fa fa-share"></i> Flow Output</label>
            <input type="checkbox" id="node-input-useFlowOutput" style="width: auto;">
            <span style="margin-left: 5px;">Delegate to downstream nodes</span>
        </div>
        <div id="sql-preview-section" class="form-row" style="display: none;">
            <label><i class="fa fa-code"></i> Preview</label>
            <pre id="sql-preview" style="background: #f5f5f5; padding: 10px; border-radius: 3px; font-size: 11px; overflow-x: auto;"></pre>
        </div>
    </div>

    <!-- Pagination Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-list-ol"></i> Pagination
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-paginationEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-paginationEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable pagination for list endpoints</span>
    </div>

    <div id="pagination-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-defaultPageSize"><i class="fa fa-list"></i> Default Size</label>
            <input type="number" id="node-input-defaultPageSize" min="1" placeholder="20">
            <div id="default-page-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-maxPageSize"><i class="fa fa-list"></i> Max Size</label>
            <input type="number" id="node-input-maxPageSize" min="1" placeholder="100">
            <div id="max-page-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-paginationStyle"><i class="fa fa-bookmark"></i> Style</label>
            <select id="node-input-paginationStyle">
                <option value="offset">Offset (page/limit)</option>
                <option value="cursor">Cursor-based</option>
            </select>
        </div>
    </div>

    <!-- Filtering Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-filter"></i> Filtering
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-filteringEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-filteringEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable field filtering</span>
    </div>

    <div id="filtering-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-filterableFields"><i class="fa fa-list"></i> Fields</label>
            <input type="text" id="node-input-filterableFields" placeholder="name, email, status">
        </div>
        <div class="form-row">
            <label>&nbsp;</label>
            <div id="filterable-fields-display" style="display: inline;"></div>
        </div>
    </div>

    <!-- Sorting Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-sort"></i> Sorting
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-sortingEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-sortingEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable field sorting</span>
    </div>

    <div id="sorting-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-sortableFields"><i class="fa fa-list"></i> Fields</label>
            <input type="text" id="node-input-sortableFields" placeholder="name, createdAt, status">
        </div>
        <div class="form-row">
            <label>&nbsp;</label>
            <div id="sortable-fields-display" style="display: inline;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-defaultSortField"><i class="fa fa-sort-alpha-asc"></i> Default</label>
            <input type="text" id="node-input-defaultSortField" placeholder="createdAt">
        </div>
        <div class="form-row">
            <label for="node-input-defaultSortDirection"><i class="fa fa-long-arrow-down"></i> Direction</label>
            <select id="node-input-defaultSortDirection">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>
    </div>

    <!-- Transformation Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-exchange"></i> Transformation
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-transformationEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-transformationEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable request/response transformation</span>
    </div>

    <div id="transformation-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-requestTransformExpression"><i class="fa fa-sign-in"></i> Request</label>
            <textarea id="node-input-requestTransformExpression" rows="3" placeholder='{"userId": $.id, "fullName": $.firstName & " " & $.lastName}' style="width: 70%; font-family: monospace; font-size: 11px;"></textarea>
            <div id="request-transform-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-responseTransformExpression"><i class="fa fa-sign-out"></i> Response</label>
            <textarea id="node-input-responseTransformExpression" rows="3" placeholder='{"data": $, "timestamp": $now()}' style="width: 70%; font-family: monospace; font-size: 11px;"></textarea>
            <div id="response-transform-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-fieldMappings"><i class="fa fa-random"></i> Mappings</label>
            <input type="text" id="node-input-fieldMappings" placeholder="oldName->newName, foo->bar">
            <div id="field-mappings-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label>&nbsp;</label>
            <div id="field-mappings-display" style="display: inline;"></div>
        </div>
    </div>

    <!-- Rate Limiting Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-tachometer"></i> Rate Limiting
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-rateLimitingEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-rateLimitingEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable rate limiting</span>

    <div id="rate-limiting-config" style="display: none;">
        <div class="form-row">

            <input type="number" id="node-input-rateLimitRequests" min="1" placeholder="100">
            <div id="rate-limit-requests-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-rateLimitWindowMs"><i class="fa fa-clock-o"></i> Window (ms)</label>
            <input type="number" id="node-input-rateLimitWindowMs" min="1000" placeholder="60000">
            <div id="rate-limit-window-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-rateLimitKeyType"><i class="fa fa-key"></i> Key Type</label>
            <select id="node-input-rateLimitKeyType">
                <option value="ip">IP Address</option>
                <option value="user">User ID</option>
                <option value="combined">IP + User</option>
                <option value="custom">Custom</option>
            </select>
        </div>
        <div class="form-row" id="custom-key-path-row" style="display: none;">
            <label for="node-input-rateLimitCustomKeyPath"><i class="fa fa-code"></i> Key Path</label>
            <input type="text" id="node-input-rateLimitCustomKeyPath" placeholder="req.headers.x-api-key">
        </div>
    </div>

    <!-- Caching Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-archive"></i> Caching
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-cachingEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-cachingEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable response caching</span>
    </div>

    <div id="caching-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-cacheTTL"><i class="fa fa-clock-o"></i> TTL (ms)</label>
            <input type="number" id="node-input-cacheTTL" min="0" placeholder="300000">
            <div id="cache-ttl-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-cacheMaxSize"><i class="fa fa-database"></i> Max Size</label>
            <input type="number" id="node-input-cacheMaxSize" min="1" placeholder="100">
            <div id="cache-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-cacheKeyStrategy"><i class="fa fa-key"></i> Key Strategy</label>
            <select id="node-input-cacheKeyStrategy">
                <option value="full">Full URL + Query</option>
                <option value="path">Path Only</option>
                <option value="custom">Custom Expression</option>
            </select>
        </div>
        <div class="form-row" id="cache-key-expression-row" style="display: none;">
            <label for="node-input-cacheKeyExpression"><i class="fa fa-code"></i> Key Expr</label>

        <div class="form-row">
            <label for="node-input-cacheVaryHeaders"><i class="fa fa-header"></i> Vary</label>
            <input type="text" id="node-input-cacheVaryHeaders" placeholder="Accept, Authorization">
        </div>
        <div class="form-row">
            <label>&nbsp;</label>
            <div id="vary-headers-display" style="display: inline;"></div>
        </div>
        <div class="form-row">
            <label for="node-input-cachePrivate"><i class="fa fa-user-secret"></i> Private</label>
            <input type="checkbox" id="node-input-cachePrivate" style="width: auto;">
            <span style="margin-left: 5px;">Cache is private (user-specific)</span>
        </div>
    </div>

    <!-- Error Handling Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-exclamation-triangle"></i> Error Handling
        </h4>
    </div>
    <div class="form-row">
        <label for="node-input-errorHandlingEnabled"><i class="fa fa-cog"></i> Enable</label>
        <input type="checkbox" id="node-input-errorHandlingEnabled" style="width: auto;">
        <span style="margin-left: 5px;">Enable standardized error handling</span>
    </div>

    <div id="error-handling-options" style="display: none;">
        <div class="form-row">
            <label for="node-input-errorFormat"><i class="fa fa-file-text"></i> Format</label>
            <select id="node-input-errorFormat">
                <option value="rfc7807">RFC 7807 (Problem Details)</option>
                <option value="simple">Simple JSON</option>
                <option value="legacy">Legacy Format</option>
            </select>
        </div>
        <div class="form-row">
            <label for="node-input-includeStackTrace"><i class="fa fa-bug"></i> Stack Trace</label>

        </div>
        <div class="form-row">

            <input type="checkbox" id="node-input-logErrors" style="width: auto;">

        </div>
        <div class="form-row">
            <label for="node-input-customErrorCodes"><i class="fa fa-list-alt"></i> Custom Codes</label>
            <textarea id="node-input-customErrorCodes" rows="3" placeholder='{"CUSTOM_ERROR": {"status": 400, "title": "Custom Error"}}' style="width: 70%; font-family: monospace; font-size: 11px;"></textarea>
            <div id="custom-error-codes-warning" class="form-tips" style="color: #f0ad4e; display: none;"></div>
        </div>
    </div>

    <style>
        .param-badge, .scope-badge, .field-badge, .mapping-badge {
            display: inline-block;
            padding: 2px 8px;
            margin: 2px;
            border-radius: 10px;
            font-size: 11px;
            font-family: monospace;
        }
        .param-badge { background: #e3f2fd; color: #1565c0; }
        .scope-badge { background: #fce4ec; color: #c62828; }
        .field-badge { background: #e8f5e9; color: #2e7d32; }
        .mapping-badge { background: #fff3e0; color: #ef6c00; }
        .input-error { border-color: #d9534f !important; }
        .schema-section { margin-bottom: 10px; }
        .schema-section-header { cursor: pointer; }
        .schema-section-header:hover { background: #eee !important; }
    </style>
</script>

<script type="text/html" data-help-name="api-endpoint">
    <p>Defines an API endpoint with comprehensive request/response handling capabilities.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>req <span class="property-type">object</span></dt>
        <dd>The HTTP request object (populated by api-server)</dd>
        <dt>res <span class="property-type">object</span></dt>
        <dd>The HTTP response object (populated by api-server)</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>endpoint <span class="property-type">object</span></dt>
        <dd>Endpoint metadata including path, method, and configuration</dd>
        <dt>crud <span class="property-type">object</span></dt>
        <dd>CRUD operation context (if configured)</dd>
        <dt>pagination <span class="property-type">object</span></dt>
        <dd>Parsed pagination parameters (if enabled)</dd>
        <dt>filtering <span class="property-type">object</span></dt>
        <dd>Parsed filter parameters with SQL WHERE clause</dd>
        <dt>sorting <span class="property-type">object</span></dt>
        <dd>Parsed sort parameters with SQL ORDER BY clause</dd>
        <dt>rateLimit <span class="property-type">object</span></dt>
        <dd>Rate limit status and remaining quota</dd>
        <dt>cache <span class="property-type">object</span></dt>
        <dd>Cache hit/miss status and key</dd>
    </dl>

    <h3>Configuration</h3>
    <p><b>Path:</b> Express-style path with parameters (e.g., <code>/users/:id</code>)</p>
    <p><b>Method:</b> HTTP method (GET, POST, PUT, DELETE, PATCH)</p>

    <h3>Request Validation</h3>
    <p>Define JSON Schema for body, query params, and path params. Invalid requests return 400 errors with details.</p>
    <pre>{
    "type": "object",
    "properties": {
        "name": { "type": "string", "minLength": 1 },
        "email": { "type": "string", "format": "email" }
    },
    "required": ["name", "email"]
}</pre>

    <h3>Response Configuration</h3>
    <p>Define response schemas per status code for OpenAPI documentation:</p>
    <pre>{
    "200": {
        "type": "object",
        "properties": {
            "id": { "type": "integer" },
            "name": { "type": "string" }
        }
    },
    "404": {
        "type": "object",
        "properties": {
            "error": { "type": "string" }
        }
    }
}</pre>

    <h3>Authorization</h3>
    <p>Define required OAuth2 scopes with AND/OR operator logic.</p>

    <h3>CRUD Operations</h3>
    <p>Map endpoints to database operations with optional SQL generation.</p>

    <h3>Pagination</h3>
    <p>Supports offset-based (<code>?page=1&limit=20</code>) and cursor-based pagination.</p>

    <h3>Filtering & Sorting</h3>
    <p>Filter: <code>?filter[status]=active</code> or <code>?filter[age][gt]=18</code></p>
    <p>Sort: <code>?sort=name,-createdAt</code> (- prefix for descending)</p>

    <h3>Transformation</h3>
    <p>Use JSONata expressions for request/response transformation:</p>
    <pre>{"userId": $.id, "fullName": $.firstName & " " & $.lastName}</pre>

    <h3>Rate Limiting</h3>
    <p>Limit requests per IP, user, or custom key with configurable windows.</p>

    <h3>Caching</h3>
    <p>Cache GET responses with configurable TTL, key strategy, and Vary headers.</p>

    <h3>Error Handling</h3>
    <p>Standardized error responses in RFC 7807, simple JSON, or legacy format.</p>
</script>
