<script type="text/javascript">
    RED.nodes.registerType('api-endpoint', {
        category: 'API Gateway',
        color: '#87CEEB',
        defaults: {
            name: { value: "" },
            server: { value: "", type: "api-server" },
            path: { value: "/", required: true },
            method: { value: "GET", required: true },
            validationEnabled: { value: true },
            bodySchema: { value: "" },
            querySchema: { value: "" },
            paramsSchema: { value: "" },
            // Response configuration
            successStatusCode: { value: "200" },
            responseContentType: { value: "application/json" },
            responseSchemas: { value: "" },
            validateResponseEnabled: { value: false },
            // Authorization configuration
            requiredScopes: { value: "" },
            scopeOperator: { value: "AND" },
            // CRUD operation mapping
            crudOperation: { value: "none" },
            tableName: { value: "" },
            primaryKey: { value: "id" },
            autoGenerateSql: { value: false },
            useFlowOutput: { value: true },
            // Pagination
            paginationEnabled: { value: false },
            defaultPageSize: { value: "20" },
            maxPageSize: { value: "100" },
            paginationStyle: { value: "offset" },
            // Filtering
            filteringEnabled: { value: false },
            filterableFields: { value: "" },
            // Sorting
            sortingEnabled: { value: false },
            sortableFields: { value: "" },
            defaultSortField: { value: "" },
            defaultSortDirection: { value: "asc" },
            // Transformation
            transformationEnabled: { value: false },
            requestTransformExpression: { value: "" },
            responseTransformExpression: { value: "" },
            fieldMappings: { value: "" },
            // Rate Limiting
            rateLimitingEnabled: { value: false },
            rateLimitRequests: { value: "100" },
            rateLimitWindowMs: { value: "60000" },
            rateLimitKeyType: { value: "ip" },
            rateLimitCustomKeyPath: { value: "" },
            // Caching
            cachingEnabled: { value: false },
            cacheTTL: { value: "300000" },
            cacheMaxSize: { value: "100" },
            cacheKeyStrategy: { value: "full" },
            cacheKeyExpression: { value: "" },
            cacheVaryHeaders: { value: "" },
            cachePrivate: { value: false }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-plug",
        label: function() {
            if (this.name) {
                return this.name;
            }
            if (this.path && this.method) {
                return this.method + " " + this.path;
            }
            return "API endpoint";
        },
        paletteLabel: "API endpoint",
        oneditprepare: function() {
            var node = this;

            // Path validation function
            function validatePath(path) {
                if (!path || path.trim() === '') {
                    return { valid: false, error: 'Path is required' };
                }
                if (!path.startsWith('/')) {
                    return { valid: false, error: 'Path must start with /' };
                }
                if (path.indexOf('//') !== -1) {
                    return { valid: false, error: 'Path cannot contain double slashes' };
                }
                var invalidParamRegex = /:([^/]*)/g;
                var match;
                while ((match = invalidParamRegex.exec(path)) !== null) {
                    var paramName = match[1];
                    if (paramName && !/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(paramName)) {
                        return { valid: false, error: 'Invalid parameter name: ' + paramName };
                    }
                }
                return { valid: true };
            }

            // JSON Schema validation
            function validateJsonSchema(schemaStr) {
                if (!schemaStr || schemaStr.trim() === '') {
                    return { valid: true };
                }
                try {
                    var schema = JSON.parse(schemaStr);
                    if (typeof schema !== 'object' || schema === null) {
                        return { valid: false, error: 'Schema must be a JSON object' };
                    }
                    return { valid: true };
                } catch (e) {
                    return { valid: false, error: 'Invalid JSON: ' + e.message };
                }
            }

            // Format JSON in textarea
            function formatJson(textareaId) {
                var $textarea = $(textareaId);
                var value = $textarea.val().trim();
                if (value) {
                    try {
                        var obj = JSON.parse(value);
                        $textarea.val(JSON.stringify(obj, null, 2));
                    } catch (e) {
                        // Leave as-is if not valid JSON
                    }
                }
            }

            // Update param display
            function updateParamDisplay() {
                var path = $('#node-input-path').val();
                var params = [];
                var paramRegex = /:([a-zA-Z_][a-zA-Z0-9_]*)/g;
                var match;
                while ((match = paramRegex.exec(path)) !== null) {
                    params.push(match[1]);
                }

                var $paramList = $('#param-list');
                $paramList.empty();

                if (params.length > 0) {
                    $('#param-display').show();
                    params.forEach(function(param) {
                        $paramList.append('<span class="param-badge">' + param + '</span> ');
                    });
                } else {
                    $('#param-display').hide();
                }

                // Validate path
                var validation = validatePath(path);
                var $pathInput = $('#node-input-path');
                var $pathError = $('#path-error');

                if (!validation.valid) {
                    $pathInput.addClass('input-error');
                    $pathError.text(validation.error).show();
                } else {
                    $pathInput.removeClass('input-error');
                    $pathError.hide();
                }
            }

            // Setup schema editor validation
            function setupSchemaValidation(textareaId, errorId) {
                $(textareaId).on('input change', function() {
                    var validation = validateJsonSchema($(this).val());
                    var $error = $(errorId);
                    if (!validation.valid) {
                        $(this).addClass('input-error');
                        $error.text(validation.error).show();
                    } else {
                        $(this).removeClass('input-error');
                        $error.hide();
                    }
                });
            }

            // Toggle validation section visibility
            function updateValidationVisibility() {
                var enabled = $('#node-input-validationEnabled').is(':checked');
                if (enabled) {
                    $('#validation-schemas').show();
                } else {
                    $('#validation-schemas').hide();
                }
            }

            // Initialize collapsible sections
            $('.schema-section-header').on('click', function() {
                var $content = $(this).next('.schema-section-content');
                var $icon = $(this).find('.section-toggle-icon');
                $content.slideToggle(200);
                $icon.toggleClass('fa-chevron-down fa-chevron-right');
            });

            // Event listeners
            $('#node-input-path').on('input change', updateParamDisplay);
            $('#node-input-validationEnabled').on('change', updateValidationVisibility);

            // Setup schema validation for each editor
            setupSchemaValidation('#node-input-bodySchema', '#body-schema-error');
            setupSchemaValidation('#node-input-querySchema', '#query-schema-error');
            setupSchemaValidation('#node-input-paramsSchema', '#params-schema-error');

            // Setup response schemas validation (different format - object with status codes as keys)
            $('#node-input-responseSchemas').on('input change', function() {
                var value = $(this).val().trim();
                var $error = $('#response-schemas-error');
                if (!value) {
                    $(this).removeClass('input-error');
                    $error.hide();
                    return;
                }
                try {
                    var schemas = JSON.parse(value);
                    if (typeof schemas !== 'object' || schemas === null || Array.isArray(schemas)) {
                        $(this).addClass('input-error');
                        $error.text('Must be an object mapping status codes to schemas').show();
                        return;
                    }
                    // Validate each status code
                    for (var statusCode in schemas) {
                        if (statusCode !== 'default' && !/^[1-5][0-9]{2}$/.test(statusCode)) {
                            $(this).addClass('input-error');
                            $error.text('Invalid status code: ' + statusCode).show();
                            return;
                        }
                        if (typeof schemas[statusCode] !== 'object' || schemas[statusCode] === null) {
                            $(this).addClass('input-error');
                            $error.text('Schema for ' + statusCode + ' must be an object').show();
                            return;
                        }
                    }
                    $(this).removeClass('input-error');
                    $error.hide();
                } catch (e) {
                    $(this).addClass('input-error');
                    $error.text('Invalid JSON: ' + e.message).show();
                }
            });

            // Format buttons
            $('#format-body-schema').on('click', function() {
                formatJson('#node-input-bodySchema');
            });
            $('#format-query-schema').on('click', function() {
                formatJson('#node-input-querySchema');
            });
            $('#format-params-schema').on('click', function() {
                formatJson('#node-input-paramsSchema');
            });
            $('#format-response-schemas').on('click', function() {
                formatJson('#node-input-responseSchemas');
            });

            // Update scope display
            function updateScopeDisplay() {
                var scopesStr = $('#node-input-requiredScopes').val();
                var scopes = scopesStr ? scopesStr.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; }) : [];

                var $scopeList = $('#scope-list');
                $scopeList.empty();

                if (scopes.length > 0) {
                    $('#scope-display').show();
                    var operator = $('#node-input-scopeOperator').val();
                    scopes.forEach(function(scope, index) {
                        $scopeList.append('<span class="scope-badge">' + scope + '</span>');
                        if (index < scopes.length - 1) {
                            $scopeList.append(' <span style="color: #666;">' + operator + '</span> ');
                        }
                    });
                } else {
                    $('#scope-display').hide();
                }
            }

            // Event listeners for scopes
            $('#node-input-requiredScopes').on('input change', updateScopeDisplay);
            $('#node-input-scopeOperator').on('change', updateScopeDisplay);

            // Toggle CRUD configuration visibility
            function updateCrudVisibility() {
                var operation = $('#node-input-crudOperation').val();
                if (operation && operation !== 'none') {
                    $('#crud-config').show();
                    updateSqlPreview();
                } else {
                    $('#crud-config').hide();
                }
            }

            // Toggle SQL preview based on auto-generate option
            function updateSqlPreview() {
                var autoGenerate = $('#node-input-autoGenerateSql').is(':checked');
                if (autoGenerate) {
                    $('#sql-preview-section').show();
                    generateSqlPreview();
                } else {
                    $('#sql-preview-section').hide();
                }
            }

            // Generate and display SQL preview
            function generateSqlPreview() {
                var operation = $('#node-input-crudOperation').val();
                var tableName = $('#node-input-tableName').val().trim() || '[table_name]';
                var primaryKey = $('#node-input-primaryKey').val().trim() || 'id';
                var sql = '';

                switch (operation) {
                    case 'list':
                        sql = 'SELECT * FROM ' + tableName;
                        break;
                    case 'get':
                        sql = 'SELECT * FROM ' + tableName + ' WHERE ' + primaryKey + ' = @' + primaryKey;
                        break;
                    case 'create':
                        sql = 'INSERT INTO ' + tableName + ' (@columns) VALUES (@values)';
                        break;
                    case 'update':
                        sql = 'UPDATE ' + tableName + ' SET @assignments WHERE ' + primaryKey + ' = @' + primaryKey;
                        break;
                    case 'delete':
                        sql = 'DELETE FROM ' + tableName + ' WHERE ' + primaryKey + ' = @' + primaryKey;
                        break;
                    default:
                        sql = '-- No operation selected';
                }

                $('#sql-preview').text(sql);
            }

            // Validate table name
            function validateTableName() {
                var tableName = $('#node-input-tableName').val().trim();
                var $error = $('#table-name-error');
                if (!tableName) {
                    $error.hide();
                    return;
                }
                if (!/^[a-zA-Z_][a-zA-Z0-9_]*(\.[a-zA-Z_][a-zA-Z0-9_]*)?$/.test(tableName)) {
                    $error.text('Invalid table name format').show();
                } else {
                    $error.hide();
                }
            }

            // Event listeners for CRUD
            $('#node-input-crudOperation').on('change', updateCrudVisibility);
            $('#node-input-autoGenerateSql').on('change', updateSqlPreview);
            $('#node-input-tableName').on('input change', function() {
                validateTableName();
                generateSqlPreview();
            });
            $('#node-input-primaryKey').on('input change', generateSqlPreview);

            // Toggle pagination configuration visibility
            function updatePaginationVisibility() {
                var enabled = $('#node-input-paginationEnabled').is(':checked');
                if (enabled) {
                    $('#pagination-config').show();
                } else {
                    $('#pagination-config').hide();
                }
            }

            // Validate pagination configuration
            function validatePaginationConfig() {
                var defaultSize = parseInt($('#node-input-defaultPageSize').val(), 10);
                var maxSize = parseInt($('#node-input-maxPageSize').val(), 10);
                var $defaultError = $('#default-page-size-error');
                var $maxError = $('#max-page-size-error');

                // Validate default page size
                if (isNaN(defaultSize) || defaultSize < 1) {
                    $defaultError.text('Must be a positive integer').show();
                } else {
                    $defaultError.hide();
                }

                // Validate max page size
                if (isNaN(maxSize) || maxSize < 1) {
                    $maxError.text('Must be a positive integer').show();
                } else if (!isNaN(defaultSize) && defaultSize > maxSize) {
                    $maxError.text('Must be >= default page size').show();
                } else {
                    $maxError.hide();
                }
            }

            // Event listeners for pagination
            $('#node-input-paginationEnabled').on('change', updatePaginationVisibility);
            $('#node-input-defaultPageSize').on('input change', validatePaginationConfig);
            $('#node-input-maxPageSize').on('input change', validatePaginationConfig);

            // Toggle filtering configuration visibility
            function updateFilteringVisibility() {
                var enabled = $('#node-input-filteringEnabled').is(':checked');
                if (enabled) {
                    $('#filtering-config').show();
                } else {
                    $('#filtering-config').hide();
                }
            }

            // Toggle sorting configuration visibility
            function updateSortingVisibility() {
                var enabled = $('#node-input-sortingEnabled').is(':checked');
                if (enabled) {
                    $('#sorting-config').show();
                } else {
                    $('#sorting-config').hide();
                }
            }

            // Display field badges for filtering
            function updateFilterableFieldsDisplay() {
                var fields = $('#node-input-filterableFields').val();
                var $display = $('#filterable-fields-display');
                $display.empty();
                if (fields) {
                    fields.split(',').forEach(function(field) {
                        field = field.trim();
                        if (field && /^[a-zA-Z_][a-zA-Z0-9_]*$/.test(field)) {
                            $display.append('<span class="field-badge">' + field + '</span>');
                        }
                    });
                }
            }

            // Display field badges for sorting
            function updateSortableFieldsDisplay() {
                var fields = $('#node-input-sortableFields').val();
                var $display = $('#sortable-fields-display');
                $display.empty();
                if (fields) {
                    fields.split(',').forEach(function(field) {
                        field = field.trim();
                        if (field && /^[a-zA-Z_][a-zA-Z0-9_]*$/.test(field)) {
                            $display.append('<span class="field-badge">' + field + '</span>');
                        }
                    });
                }
            }

            // Event listeners for filtering/sorting
            $('#node-input-filteringEnabled').on('change', updateFilteringVisibility);
            $('#node-input-sortingEnabled').on('change', updateSortingVisibility);
            $('#node-input-filterableFields').on('input change', updateFilterableFieldsDisplay);
            $('#node-input-sortableFields').on('input change', updateSortableFieldsDisplay);

            // Toggle transformation configuration visibility
            function updateTransformationVisibility() {
                var enabled = $('#node-input-transformationEnabled').is(':checked');
                if (enabled) {
                    $('#transformation-config').show();
                } else {
                    $('#transformation-config').hide();
                }
            }

            // Validate JSONata expression
            function validateJsonataExpression(exprStr) {
                if (!exprStr || exprStr.trim() === '') {
                    return { valid: true };
                }
                // Basic syntax check - just verify it's not obviously broken
                // Full validation happens on the server side
                var trimmed = exprStr.trim();
                // Check for balanced brackets and parentheses
                var brackets = 0;
                var parens = 0;
                var braces = 0;
                var inString = false;
                var stringChar = null;
                for (var i = 0; i < trimmed.length; i++) {
                    var c = trimmed[i];
                    if (inString) {
                        if (c === stringChar && trimmed[i-1] !== '\\') {
                            inString = false;
                        }
                    } else {
                        if (c === '"' || c === "'") {
                            inString = true;
                            stringChar = c;
                        } else if (c === '[') brackets++;
                        else if (c === ']') brackets--;
                        else if (c === '(') parens++;
                        else if (c === ')') parens--;
                        else if (c === '{') braces++;
                        else if (c === '}') braces--;
                    }
                }
                if (brackets !== 0) {
                    return { valid: false, error: 'Unbalanced brackets []' };
                }
                if (parens !== 0) {
                    return { valid: false, error: 'Unbalanced parentheses ()' };
                }
                if (braces !== 0) {
                    return { valid: false, error: 'Unbalanced braces {}' };
                }
                if (inString) {
                    return { valid: false, error: 'Unterminated string' };
                }
                return { valid: true };
            }

            // Setup JSONata expression validation
            function setupExpressionValidation(textareaId, errorId) {
                $(textareaId).on('input change', function() {
                    var validation = validateJsonataExpression($(this).val());
                    var $error = $(errorId);
                    if (!validation.valid) {
                        $(this).addClass('input-error');
                        $error.text(validation.error).show();
                    } else {
                        $(this).removeClass('input-error');
                        $error.hide();
                    }
                });
            }

            // Validate field mappings
            function validateFieldMappings(mappingStr) {
                if (!mappingStr || mappingStr.trim() === '') {
                    return { valid: true };
                }
                var pairs = mappingStr.split(',');
                for (var i = 0; i < pairs.length; i++) {
                    var pair = pairs[i].trim();
                    if (!pair) continue;
                    // Support both -> and : as separators
                    var parts = pair.split('->');
                    if (parts.length !== 2) {
                        parts = pair.split(':');
                    }
                    if (parts.length !== 2) {
                        return { valid: false, error: 'Invalid format: "' + pair + '". Use oldName->newName' };
                    }
                    var oldName = parts[0].trim();
                    var newName = parts[1].trim();
                    if (!oldName || !newName) {
                        return { valid: false, error: 'Both old and new names required in: "' + pair + '"' };
                    }
                    var fieldNameRegex = /^[a-zA-Z_][a-zA-Z0-9_]*$/;
                    if (!fieldNameRegex.test(oldName)) {
                        return { valid: false, error: 'Invalid source field name: "' + oldName + '"' };
                    }
                    if (!fieldNameRegex.test(newName)) {
                        return { valid: false, error: 'Invalid target field name: "' + newName + '"' };
                    }
                }
                return { valid: true };
            }

            // Setup field mappings validation
            $('#node-input-fieldMappings').on('input change', function() {
                var validation = validateFieldMappings($(this).val());
                var $error = $('#field-mappings-error');
                if (!validation.valid) {
                    $(this).addClass('input-error');
                    $error.text(validation.error).show();
                } else {
                    $(this).removeClass('input-error');
                    $error.hide();
                }
                updateFieldMappingsDisplay();
            });

            // Display field mappings as badges
            function updateFieldMappingsDisplay() {
                var mappingStr = $('#node-input-fieldMappings').val();
                var $display = $('#field-mappings-display');
                $display.empty();
                if (mappingStr) {
                    var pairs = mappingStr.split(',');
                    pairs.forEach(function(pair) {
                        pair = pair.trim();
                        if (!pair) return;
                        var parts = pair.split('->');
                        if (parts.length !== 2) {
                            parts = pair.split(':');
                        }
                        if (parts.length === 2) {
                            var oldName = parts[0].trim();
                            var newName = parts[1].trim();
                            if (oldName && newName) {
                                $display.append('<span class="mapping-badge">' + oldName + ' → ' + newName + '</span>');
                            }
                        }
                    });
                }
            }

            // Event listeners for transformation
            $('#node-input-transformationEnabled').on('change', updateTransformationVisibility);
            setupExpressionValidation('#node-input-requestTransformExpression', '#request-transform-error');
            setupExpressionValidation('#node-input-responseTransformExpression', '#response-transform-error');

            // Toggle rate limiting configuration visibility
            function updateRateLimitingVisibility() {
                var enabled = $('#node-input-rateLimitingEnabled').is(':checked');
                if (enabled) {
                    $('#rate-limiting-config').show();
                } else {
                    $('#rate-limiting-config').hide();
                }
                updateCustomKeyPathVisibility();
            }

            // Toggle custom key path visibility based on key type
            function updateCustomKeyPathVisibility() {
                var keyType = $('#node-input-rateLimitKeyType').val();
                if (keyType === 'custom') {
                    $('#custom-key-path-row').show();
                } else {
                    $('#custom-key-path-row').hide();
                }
            }

            // Validate rate limit configuration
            function validateRateLimitConfig() {
                var requests = parseInt($('#node-input-rateLimitRequests').val(), 10);
                var windowMs = parseInt($('#node-input-rateLimitWindowMs').val(), 10);
                var $requestsError = $('#rate-limit-requests-error');
                var $windowError = $('#rate-limit-window-error');

                // Validate requests
                if (isNaN(requests) || requests < 1) {
                    $requestsError.text('Must be a positive integer').show();
                } else {
                    $requestsError.hide();
                }

                // Validate window
                if (isNaN(windowMs) || windowMs < 1000) {
                    $windowError.text('Must be at least 1000ms (1 second)').show();
                } else {
                    $windowError.hide();
                }
            }

            // Event listeners for rate limiting
            $('#node-input-rateLimitingEnabled').on('change', updateRateLimitingVisibility);
            $('#node-input-rateLimitKeyType').on('change', updateCustomKeyPathVisibility);
            $('#node-input-rateLimitRequests').on('input change', validateRateLimitConfig);
            $('#node-input-rateLimitWindowMs').on('input change', validateRateLimitConfig);

            // Toggle caching configuration visibility
            function updateCachingVisibility() {
                var enabled = $('#node-input-cachingEnabled').is(':checked');
                if (enabled) {
                    $('#caching-config').show();
                } else {
                    $('#caching-config').hide();
                }
                updateCacheKeyExpressionVisibility();
            }

            // Toggle custom key expression visibility based on strategy
            function updateCacheKeyExpressionVisibility() {
                var keyStrategy = $('#node-input-cacheKeyStrategy').val();
                if (keyStrategy === 'custom') {
                    $('#cache-key-expression-row').show();
                } else {
                    $('#cache-key-expression-row').hide();
                }
            }

            // Validate caching configuration
            function validateCachingConfig() {
                var ttl = parseInt($('#node-input-cacheTTL').val(), 10);
                var maxSize = parseInt($('#node-input-cacheMaxSize').val(), 10);
                var $ttlError = $('#cache-ttl-error');
                var $sizeError = $('#cache-size-error');

                // Validate TTL
                if (isNaN(ttl) || ttl < 0) {
                    $ttlError.text('Must be a non-negative integer (0 = no expiry)').show();
                } else {
                    $ttlError.hide();
                }

                // Validate max size
                if (isNaN(maxSize) || maxSize < 1) {
                    $sizeError.text('Must be a positive integer').show();
                } else {
                    $sizeError.hide();
                }
            }

            // Display vary headers as badges
            function updateVaryHeadersDisplay() {
                var varyHeaders = $('#node-input-cacheVaryHeaders').val() || '';
                var headers = varyHeaders.split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h.length > 0; });
                var $display = $('#vary-headers-display');
                $display.empty();
                headers.forEach(function(header) {
                    $display.append('<span class="field-badge">' + header + '</span>');
                });
            }

            // Event listeners for caching
            $('#node-input-cachingEnabled').on('change', updateCachingVisibility);
            $('#node-input-cacheKeyStrategy').on('change', updateCacheKeyExpressionVisibility);
            $('#node-input-cacheTTL').on('input change', validateCachingConfig);
            $('#node-input-cacheMaxSize').on('input change', validateCachingConfig);
            $('#node-input-cacheVaryHeaders').on('input change', updateVaryHeadersDisplay);

            // Initial updates
            updateParamDisplay();
            updateValidationVisibility();
            updateScopeDisplay();
            updateCrudVisibility();
            updatePaginationVisibility();
            updateFilteringVisibility();
            updateSortingVisibility();
            updateFilterableFieldsDisplay();
            updateSortableFieldsDisplay();
            updateTransformationVisibility();
            updateFieldMappingsDisplay();
            updateRateLimitingVisibility();
            updateCachingVisibility();
            updateVaryHeadersDisplay();

            // Format existing schemas on open
            formatJson('#node-input-bodySchema');
            formatJson('#node-input-querySchema');
            formatJson('#node-input-paramsSchema');
            formatJson('#node-input-responseSchemas');
        },
        oneditsave: function() {
            // Normalize path on save
            var path = $('#node-input-path').val().trim();
            if (path && !path.startsWith('/')) {
                path = '/' + path;
            }
            if (path && path.length > 1 && path.endsWith('/')) {
                path = path.slice(0, -1);
            }
            this.path = path || '/';

            // Minify schemas on save to reduce storage
            var schemas = ['bodySchema', 'querySchema', 'paramsSchema', 'responseSchemas'];
            schemas.forEach(function(schema) {
                var value = $('#node-input-' + schema).val().trim();
                if (value) {
                    try {
                        var obj = JSON.parse(value);
                        $('#node-input-' + schema).val(JSON.stringify(obj));
                    } catch (e) {
                        // Leave as-is if not valid JSON
                    }
                }
            });
        }
    });
</script>

<script type="text/html" data-template-name="api-endpoint">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-method"><i class="fa fa-exchange"></i> Method</label>
        <select id="node-input-method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-path"><i class="fa fa-globe"></i> Path</label>
        <input type="text" id="node-input-path" placeholder="/users/:id">
        <div id="path-error" class="form-tips" style="color: #d9534f; display: none;"></div>
    </div>
    <div class="form-row" id="param-display" style="display: none;">
        <label><i class="fa fa-list"></i> Parameters</label>
        <div id="param-list" style="display: inline-block;"></div>
    </div>

    <hr>

    <div class="form-row">
        <label for="node-input-validationEnabled">
            <i class="fa fa-check-square"></i> Validation
        </label>
        <input type="checkbox" id="node-input-validationEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable request validation</span>
    </div>

    <div id="validation-schemas">
        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-file-code-o"></i> Request Body Schema
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-bodySchema" rows="8" placeholder='{"type": "object", "properties": {...}, "required": [...]}'></textarea>
                    <div id="body-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-body-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                        <i class="fa fa-indent"></i> Format
                    </button>
                </div>
            </div>
        </div>

        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-question-circle"></i> Query Parameters Schema
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-querySchema" rows="6" placeholder='{"type": "object", "properties": {"page": {"type": "integer"}, "limit": {"type": "integer"}}}'></textarea>
                    <div id="query-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-query-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                        <i class="fa fa-indent"></i> Format
                    </button>
                </div>
            </div>
        </div>

        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-link"></i> Path Parameters Schema
            </div>
            <div class="schema-section-content">
                <div class="form-row">
                    <textarea id="node-input-paramsSchema" rows="4" placeholder='{"type": "object", "properties": {"id": {"type": "integer"}}}'></textarea>
                    <div id="params-schema-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                    <button type="button" id="format-params-schema" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                        <i class="fa fa-indent"></i> Format
                    </button>
                </div>
            </div>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-reply"></i> Response Configuration</label>
    </div>

    <div class="form-row">
        <label for="node-input-successStatusCode"><i class="fa fa-check-circle"></i> Success Code</label>
        <select id="node-input-successStatusCode" style="width: 120px;">
            <option value="200">200 OK</option>
            <option value="201">201 Created</option>
            <option value="202">202 Accepted</option>
            <option value="204">204 No Content</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-responseContentType"><i class="fa fa-file-text-o"></i> Content-Type</label>
        <select id="node-input-responseContentType" style="width: 200px;">
            <option value="application/json">application/json</option>
            <option value="application/xml">application/xml</option>
            <option value="text/plain">text/plain</option>
            <option value="text/html">text/html</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-validateResponseEnabled">
            <i class="fa fa-bug"></i> Dev Mode
        </label>
        <input type="checkbox" id="node-input-validateResponseEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Validate responses (for debugging)</span>
    </div>

    <div class="schema-section">
        <div class="schema-section-header">
            <i class="fa fa-chevron-down section-toggle-icon"></i>
            <i class="fa fa-reply"></i> Response Schemas
        </div>
        <div class="schema-section-content">
            <div class="form-tips" style="margin-bottom: 10px;">
                Define response schemas per status code. Use status codes as keys (e.g., "200", "404") or "default" for fallback.
            </div>
            <div class="form-row">
                <textarea id="node-input-responseSchemas" rows="10" placeholder='{
  "200": {
    "type": "object",
    "properties": {
      "id": { "type": "integer" },
      "name": { "type": "string" }
    }
  },
  "404": {
    "type": "object",
    "properties": {
      "error": { "type": "string" },
      "message": { "type": "string" }
    }
  }
}'></textarea>
                <div id="response-schemas-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                <button type="button" id="format-response-schemas" class="red-ui-button red-ui-button-small" style="margin-top: 5px;">
                    <i class="fa fa-indent"></i> Format
                </button>
            </div>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-lock"></i> Authorization</label>
    </div>

    <div class="form-row">
        <label for="node-input-requiredScopes"><i class="fa fa-key"></i> Scopes</label>
        <input type="text" id="node-input-requiredScopes" placeholder="read:users, write:users, admin">
        <div class="form-tips" style="margin-top: 5px;">
            Comma-separated list of OAuth2 scopes required to access this endpoint.
        </div>
    </div>

    <div class="form-row">
        <label for="node-input-scopeOperator"><i class="fa fa-filter"></i> Operator</label>
        <select id="node-input-scopeOperator" style="width: 200px;">
            <option value="AND">AND (require all scopes)</option>
            <option value="OR">OR (require any scope)</option>
        </select>
    </div>

    <div id="scope-display" style="display: none; margin-left: 105px; margin-top: 5px;">
        <label style="width: auto;">Required scopes:</label>
        <div id="scope-list" style="display: inline-block;"></div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-database"></i> CRUD Mapping</label>
    </div>

    <div class="form-row">
        <label for="node-input-crudOperation"><i class="fa fa-cog"></i> Operation</label>
        <select id="node-input-crudOperation" style="width: 200px;">
            <option value="none">None (custom logic)</option>
            <option value="list">List (GET all)</option>
            <option value="get">Get (GET by ID)</option>
            <option value="create">Create (POST)</option>
            <option value="update">Update (PUT)</option>
            <option value="delete">Delete (DELETE)</option>
        </select>
    </div>

    <div id="crud-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-tableName"><i class="fa fa-table"></i> Table Name</label>
            <input type="text" id="node-input-tableName" placeholder="users">
            <div id="table-name-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-primaryKey"><i class="fa fa-key"></i> Primary Key</label>
            <input type="text" id="node-input-primaryKey" placeholder="id">
        </div>

        <div class="form-row">
            <label for="node-input-autoGenerateSql">
                <i class="fa fa-code"></i> Auto SQL
            </label>
            <input type="checkbox" id="node-input-autoGenerateSql" style="width: auto; margin-left: 5px;">
            <span style="margin-left: 5px;">Generate basic SQL template</span>
        </div>

        <div class="form-row">
            <label for="node-input-useFlowOutput">
                <i class="fa fa-share-alt"></i> Flow Output
            </label>
            <input type="checkbox" id="node-input-useFlowOutput" style="width: auto; margin-left: 5px;" checked>
            <span style="margin-left: 5px;">Delegate to flow for custom logic</span>
        </div>

        <div id="sql-preview-section" style="display: none; margin-top: 10px;">
            <div class="form-row">
                <label><i class="fa fa-file-code-o"></i> SQL Preview</label>
            </div>
            <div class="form-row" style="margin-left: 105px;">
                <pre id="sql-preview" style="background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-wrap: break-word;"></pre>
            </div>
            <div class="form-tips" style="margin-left: 105px;">
                <i class="fa fa-info-circle"></i> @columns, @values, and @assignments are placeholders filled from request body at runtime.
            </div>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-list-ol"></i> Pagination</label>
    </div>

    <div class="form-row">
        <label for="node-input-paginationEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-paginationEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable pagination for this endpoint</span>
    </div>

    <div id="pagination-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-paginationStyle"><i class="fa fa-sliders"></i> Style</label>
            <select id="node-input-paginationStyle" style="width: 200px;">
                <option value="offset">Offset-based (page, limit, offset)</option>
                <option value="cursor">Cursor-based (cursor, limit)</option>
            </select>
        </div>

        <div class="form-row">
            <label for="node-input-defaultPageSize"><i class="fa fa-file-text-o"></i> Default Size</label>
            <input type="number" id="node-input-defaultPageSize" min="1" style="width: 80px;" placeholder="20">
            <span style="margin-left: 5px; color: #666;">items per page</span>
            <div id="default-page-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-maxPageSize"><i class="fa fa-expand"></i> Max Size</label>
            <input type="number" id="node-input-maxPageSize" min="1" style="width: 80px;" placeholder="100">
            <span style="margin-left: 5px; color: #666;">maximum items per page</span>
            <div id="max-page-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> <b>Offset-based:</b> Uses <code>page</code>, <code>limit</code>, and <code>offset</code> query params.<br>
            <i class="fa fa-info-circle"></i> <b>Cursor-based:</b> Uses <code>cursor</code> and <code>limit</code> query params for efficient pagination of large datasets.
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-filter"></i> Filtering</label>
    </div>

    <div class="form-row">
        <label for="node-input-filteringEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-filteringEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable query-based filtering</span>
    </div>

    <div id="filtering-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-filterableFields"><i class="fa fa-columns"></i> Fields</label>
            <input type="text" id="node-input-filterableFields" placeholder="name, status, created_at">
            <div class="form-tips" style="margin-left: 105px;">Comma-separated list of filterable field names</div>
        </div>

        <div class="form-row" style="margin-left: 105px;">
            <div id="filterable-fields-display"></div>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> Filter syntax: <code>filter[field]=value</code> or <code>filter[field][op]=value</code><br>
            <i class="fa fa-info-circle"></i> Operators: <code>eq</code>, <code>ne</code>, <code>gt</code>, <code>gte</code>, <code>lt</code>, <code>lte</code>, <code>like</code>, <code>in</code>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-sort"></i> Sorting</label>
    </div>

    <div class="form-row">
        <label for="node-input-sortingEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-sortingEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable query-based sorting</span>
    </div>

    <div id="sorting-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-sortableFields"><i class="fa fa-columns"></i> Fields</label>
            <input type="text" id="node-input-sortableFields" placeholder="name, created_at, updated_at">
            <div class="form-tips" style="margin-left: 105px;">Comma-separated list of sortable field names</div>
        </div>

        <div class="form-row" style="margin-left: 105px;">
            <div id="sortable-fields-display"></div>
        </div>

        <div class="form-row">
            <label for="node-input-defaultSortField"><i class="fa fa-sort-amount-asc"></i> Default Sort</label>
            <input type="text" id="node-input-defaultSortField" style="width: 120px;" placeholder="created_at">
            <select id="node-input-defaultSortDirection" style="width: 100px; margin-left: 5px;">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> Sort syntax: <code>sort=field</code> (asc) or <code>sort=-field</code> (desc)<br>
            <i class="fa fa-info-circle"></i> Multiple fields: <code>sort=field1,-field2</code>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-random"></i> Transformation</label>
    </div>

    <div class="form-row">
        <label for="node-input-transformationEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-transformationEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable request/response transformation</span>
    </div>

    <div id="transformation-config" style="display: none;">
        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-sign-in"></i> Request Transformation
            </div>
            <div class="schema-section-content">
                <div class="form-tips" style="margin-bottom: 10px;">
                    JSONata expression to transform the request body before validation. Use <code>$</code> to reference the body.
                </div>
                <div class="form-row">
                    <textarea id="node-input-requestTransformExpression" rows="6" placeholder='$merge([$$, {
  "fullName": $.firstName & " " & $.lastName,
  "emailLower": $lowercase($.email)
}])'></textarea>
                    <div id="request-transform-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                </div>
            </div>
        </div>

        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-sign-out"></i> Response Transformation
            </div>
            <div class="schema-section-content">
                <div class="form-tips" style="margin-bottom: 10px;">
                    JSONata expression to transform the response data. Stored in <code>msg.endpoint.responseTransformExpression</code> for downstream use.
                </div>
                <div class="form-row">
                    <textarea id="node-input-responseTransformExpression" rows="6" placeholder='{
  "id": $.id,
  "displayName": $.full_name,
  "contact": { "email": $.email }
}'></textarea>
                    <div id="response-transform-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                </div>
            </div>
        </div>

        <div class="schema-section">
            <div class="schema-section-header">
                <i class="fa fa-chevron-down section-toggle-icon"></i>
                <i class="fa fa-exchange"></i> Field Mappings
            </div>
            <div class="schema-section-content">
                <div class="form-tips" style="margin-bottom: 10px;">
                    Simple field renaming. Applied before JSONata expression. Format: <code>oldName->newName</code>
                </div>
                <div class="form-row">
                    <input type="text" id="node-input-fieldMappings" placeholder="firstName->first_name, lastName->last_name">
                    <div id="field-mappings-error" class="form-tips" style="color: #d9534f; display: none;"></div>
                </div>
                <div class="form-row" style="margin-top: 5px;">
                    <div id="field-mappings-display"></div>
                </div>
            </div>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> <b>JSONata</b> is a lightweight query and transformation language for JSON.<br>
            <i class="fa fa-info-circle"></i> <b>Context variables:</b> <code>$msg</code> (message), <code>$params</code> (path params), <code>$query</code> (query params), <code>$headers</code> (headers)<br>
            <i class="fa fa-info-circle"></i> <b>Common functions:</b> <code>$merge()</code>, <code>$lowercase()</code>, <code>$uppercase()</code>, <code>$trim()</code>, <code>$now()</code>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-tachometer"></i> Rate Limiting</label>
    </div>

    <div class="form-row">
        <label for="node-input-rateLimitingEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-rateLimitingEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable rate limiting for this endpoint</span>
    </div>

    <div id="rate-limiting-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-rateLimitRequests"><i class="fa fa-hashtag"></i> Requests</label>
            <input type="number" id="node-input-rateLimitRequests" min="1" style="width: 100px;" placeholder="100">
            <span style="margin-left: 5px; color: #666;">requests per window</span>
            <div id="rate-limit-requests-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-rateLimitWindowMs"><i class="fa fa-clock-o"></i> Window</label>
            <input type="number" id="node-input-rateLimitWindowMs" min="1000" step="1000" style="width: 100px;" placeholder="60000">
            <span style="margin-left: 5px; color: #666;">milliseconds (60000 = 1 minute)</span>
            <div id="rate-limit-window-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-rateLimitKeyType"><i class="fa fa-key"></i> Key Type</label>
            <select id="node-input-rateLimitKeyType" style="width: 200px;">
                <option value="ip">IP Address</option>
                <option value="user">User ID (from auth)</option>
                <option value="apiKey">API Key (from header)</option>
                <option value="custom">Custom (path expression)</option>
            </select>
        </div>

        <div class="form-row" id="custom-key-path-row" style="display: none;">
            <label for="node-input-rateLimitCustomKeyPath"><i class="fa fa-code"></i> Key Path</label>
            <input type="text" id="node-input-rateLimitCustomKeyPath" placeholder="headers.x-tenant-id">
            <div class="form-tips" style="margin-left: 105px;">Dot-notation path to extract key from request (e.g., <code>headers.x-tenant-id</code>)</div>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> Rate limiting restricts the number of requests per time window.<br>
            <i class="fa fa-info-circle"></i> <b>Key types:</b><br>
            &nbsp;&nbsp;- <b>IP Address:</b> Limits requests per client IP (supports X-Forwarded-For for proxies)<br>
            &nbsp;&nbsp;- <b>User ID:</b> Limits requests per authenticated user (from <code>req.auth.userId</code>)<br>
            &nbsp;&nbsp;- <b>API Key:</b> Limits requests per API key (from <code>X-API-Key</code> header)<br>
            &nbsp;&nbsp;- <b>Custom:</b> Limits by custom request property (specify dot-notation path)<br>
            <i class="fa fa-info-circle"></i> <b>Response headers:</b> <code>X-RateLimit-Limit</code>, <code>X-RateLimit-Remaining</code>, <code>X-RateLimit-Reset</code>, <code>Retry-After</code>
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label><i class="fa fa-database"></i> Response Caching</label>
    </div>

    <div class="form-row">
        <label for="node-input-cachingEnabled">
            <i class="fa fa-toggle-on"></i> Enable
        </label>
        <input type="checkbox" id="node-input-cachingEnabled" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 5px;">Enable response caching (GET/HEAD only)</span>
    </div>

    <div id="caching-config" style="display: none;">
        <div class="form-row">
            <label for="node-input-cacheTTL"><i class="fa fa-clock-o"></i> TTL (ms)</label>
            <input type="number" id="node-input-cacheTTL" min="0" style="width: 100px;" placeholder="300000">
            <span style="margin-left: 5px; color: #666;">milliseconds (300000 = 5 minutes, 0 = no expiry)</span>
            <div id="cache-ttl-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-cacheMaxSize"><i class="fa fa-expand"></i> Max Size</label>
            <input type="number" id="node-input-cacheMaxSize" min="1" style="width: 100px;" placeholder="100">
            <span style="margin-left: 5px; color: #666;">maximum cached responses</span>
            <div id="cache-size-error" class="form-tips" style="color: #d9534f; display: none;"></div>
        </div>

        <div class="form-row">
            <label for="node-input-cacheKeyStrategy"><i class="fa fa-key"></i> Key Strategy</label>
            <select id="node-input-cacheKeyStrategy" style="width: 200px;">
                <option value="full">Full (method + path + query)</option>
                <option value="path">Path Only (ignore query params)</option>
                <option value="query">Query (method + path + sorted query)</option>
                <option value="custom">Custom (expression)</option>
            </select>
        </div>

        <div class="form-row" id="cache-key-expression-row" style="display: none;">
            <label for="node-input-cacheKeyExpression"><i class="fa fa-code"></i> Key Expression</label>
            <input type="text" id="node-input-cacheKeyExpression" placeholder="req.path">
            <div class="form-tips" style="margin-left: 105px;">Dot-notation path to extract cache key from request (e.g., <code>req.url</code>)</div>
        </div>

        <div class="form-row">
            <label for="node-input-cacheVaryHeaders"><i class="fa fa-random"></i> Vary Headers</label>
            <input type="text" id="node-input-cacheVaryHeaders" placeholder="Accept, Accept-Language">
            <div class="form-tips" style="margin-left: 105px;">Comma-separated headers to include in cache key variation</div>
        </div>
        <div class="form-row" style="margin-top: 5px;">
            <div id="vary-headers-display" style="margin-left: 105px;"></div>
        </div>

        <div class="form-row">

            </label>
            <input type="checkbox" id="node-input-cachePrivate" style="width: auto; margin-left: 5px;">
            <span style="margin-left: 5px;">Use private cache (Cache-Control: private)</span>
        </div>

        <div class="form-tips" style="margin-top: 10px;">
            <i class="fa fa-info-circle"></i> Response caching stores responses to reduce processing for repeated requests.<br>
            <i class="fa fa-info-circle"></i> <b>Key strategies:</b><br>
            &nbsp;&nbsp;- <b>Full:</b> Cache key includes method, path, and sorted query parameters<br>
            &nbsp;&nbsp;- <b>Path:</b> Cache key includes only method and path (ignores query params)<br>
            &nbsp;&nbsp;- <b>Query:</b> Same as Full (method + path + sorted query params)<br>
            &nbsp;&nbsp;- <b>Custom:</b> Use custom expression to extract cache key<br>
            <i class="fa fa-info-circle"></i> <b>Features:</b><br>
            &nbsp;&nbsp;- ETag generation and 304 Not Modified support<br>
            &nbsp;&nbsp;- Cache-Control and Vary headers<br>
            &nbsp;&nbsp;- X-Cache: HIT/MISS headers<br>
            <i class="fa fa-info-circle"></i> <b>Note:</b> Only GET and HEAD requests are cached.
        </div>
