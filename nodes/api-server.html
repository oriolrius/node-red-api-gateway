<script type="text/javascript">
    RED.nodes.registerType('api-server', {
        category: 'API Gateway',
        color: '#87CEEB',
        defaults: {
            name: { value: "" },
            config: { value: "", type: "api-config" },
            port: { value: 3000, validate: RED.validators.number() },
            host: { value: "0.0.0.0" },
            // OpenAPI configuration
            openapiEnabled: { value: true },
            openapiPath: { value: "/openapi.json" },
            swaggerUiEnabled: { value: false },
            swaggerUiPath: { value: "/docs" },
            // Metrics configuration
            metricsEnabled: { value: true },
            metricsPath: { value: "/metrics" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-server",
        label: function() {
            if (this.name) {
                return this.name;
            }
            return "API server:" + (this.port || 3000);
        },
        paletteLabel: "API server",
        oneditprepare: function() {
            var node = this;

            // Toggle OpenAPI settings visibility
            $("#node-input-openapiEnabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".openapi-config-row").show();
                } else {
                    $(".openapi-config-row").hide();
                }
            }).trigger("change");

            // Toggle Swagger UI path visibility
            $("#node-input-swaggerUiEnabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".swagger-ui-path-row").show();
                } else {
                    $(".swagger-ui-path-row").hide();
                }
            }).trigger("change");

            // Toggle metrics path visibility
            $("#node-input-metricsEnabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".metrics-path-row").show();
                } else {
                    $(".metrics-path-row").hide();
                }
            }).trigger("change");

            // OpenAPI Import functionality
            var importState = {
                previewData: null,
                selectedTags: [],
                selectedPaths: [],
                selectAll: true
            };

            // Handle file input for OpenAPI import
            $("#openapi-file-input").on("change", function(e) {
                var file = e.target.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function(event) {
                    $("#openapi-import-content").val(event.target.result);
                    previewOpenApiSpec();
                };
                reader.onerror = function() {
                    showImportError("Failed to read file");
                };
                reader.readAsText(file);
            });

            // Preview button handler
            $("#openapi-preview-btn").on("click", function() {
                previewOpenApiSpec();
            });

            // Import button handler
            $("#openapi-import-btn").on("click", function() {
                importOpenApiSpec();
            });

            // Clear button handler
            $("#openapi-clear-btn").on("click", function() {
                clearImportState();
            });

            // Select all/none handlers
            $("#openapi-select-all").on("click", function() {
                $(".openapi-path-checkbox").prop("checked", true);
                updateSelectedPaths();
            });

            $("#openapi-select-none").on("click", function() {
                $(".openapi-path-checkbox").prop("checked", false);
                updateSelectedPaths();
            });

            function showImportError(message) {
                $("#openapi-import-error").text(message).show();
                $("#openapi-import-success").hide();
            }

            function showImportSuccess(message) {
                $("#openapi-import-success").text(message).show();
                $("#openapi-import-error").hide();
            }

            function clearMessages() {
                $("#openapi-import-error").hide();
                $("#openapi-import-success").hide();
            }

            function clearImportState() {
                importState = {
                    previewData: null,
                    selectedTags: [],
                    selectedPaths: [],
                    selectAll: true
                };
                $("#openapi-import-content").val("");
                $("#openapi-file-input").val("");
                $("#openapi-preview-results").hide();
                $("#openapi-import-btn").prop("disabled", true);
                clearMessages();
            }

            function updateSelectedPaths() {
                importState.selectedPaths = [];
                $(".openapi-path-checkbox:checked").each(function() {
                    importState.selectedPaths.push($(this).data("path"));
                });
                updateImportSummary();
            }

            function updateImportSummary() {
                var count = importState.selectedPaths.length;
                var total = importState.previewData ? importState.previewData.paths.length : 0;
                $("#openapi-selected-count").text(count + " of " + total + " paths selected");
                $("#openapi-import-btn").prop("disabled", count === 0);
            }

            function previewOpenApiSpec() {
                var content = $("#openapi-import-content").val().trim();
                if (!content) {
                    showImportError("Please provide OpenAPI specification content");
                    return;
                }

                clearMessages();
                $("#openapi-preview-btn").prop("disabled", true).text("Loading...");

                $.ajax({
                    url: "api-gateway/preview-openapi",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({ content: content }),
                    success: function(result) {
                        if (result.success) {
                            importState.previewData = result;
                            renderPreviewResults(result);
                            showImportSuccess("Parsed successfully: " + result.summary.totalEndpoints + " endpoints found");
                        } else {
                            showImportError(result.error || "Failed to parse specification");
                        }
                    },
                    error: function(xhr) {
                        var msg = "Failed to parse specification";
                        if (xhr.responseJSON && xhr.responseJSON.error) {
                            msg = xhr.responseJSON.error;
                        }
                        showImportError(msg);
                    },
                    complete: function() {
                        $("#openapi-preview-btn").prop("disabled", false).text("Preview");
                    }
                });
            }

            function renderPreviewResults(result) {
                var $results = $("#openapi-preview-results");
                var $apiInfo = $("#openapi-api-info");
                var $summary = $("#openapi-import-summary");
                var $pathList = $("#openapi-path-list");

                // API Info
                $apiInfo.html(
                    "<strong>" + escapeHtml(result.apiInfo.title) + "</strong>" +
                    (result.apiInfo.version ? " v" + escapeHtml(result.apiInfo.version) : "") +
                    (result.apiInfo.description ? "<br><small>" + escapeHtml(result.apiInfo.description.substring(0, 100)) + "</small>" : "")
                );

                // Summary
                var summaryHtml = "<div class='openapi-summary-grid'>";
                for (var method in result.summary.byMethod) {
                    summaryHtml += "<span class='method-badge method-" + method.toLowerCase() + "'>" +
                        method + ": " + result.summary.byMethod[method] + "</span> ";
                }
                summaryHtml += "</div>";
                if (result.tags.length > 0) {
                    summaryHtml += "<div style='margin-top: 5px;'><strong>Tags:</strong> " +
                        result.tags.map(function(t) { return "<span class='tag-badge'>" + escapeHtml(t) + "</span>"; }).join(" ") +
                        "</div>";
                }
                $summary.html(summaryHtml);

                // Path list with checkboxes
                $pathList.empty();
                result.paths.forEach(function(path) {
                    var $row = $("<div class='openapi-path-row'>" +
                        "<label><input type='checkbox' class='openapi-path-checkbox' data-path='" + escapeHtml(path) + "' checked> " +
                        "<code>" + escapeHtml(path) + "</code></label></div>");
                    $pathList.append($row);
                });

                // Bind checkbox handlers
                $(".openapi-path-checkbox").on("change", function() {
                    updateSelectedPaths();
                });

                // Initialize selected paths
                importState.selectedPaths = result.paths.slice();
                updateImportSummary();

                $results.show();
            }

            function importOpenApiSpec() {
                var content = $("#openapi-import-content").val().trim();
                if (!content) {
                    showImportError("No OpenAPI content to import");
                    return;
                }

                if (importState.selectedPaths.length === 0) {
                    showImportError("Please select at least one path to import");
                    return;
                }

                clearMessages();
                $("#openapi-import-btn").prop("disabled", true).text("Importing...");

                var filters = {};
                if (importState.previewData && importState.selectedPaths.length < importState.previewData.paths.length) {
                    filters.paths = importState.selectedPaths;
                }

                $.ajax({
                    url: "api-gateway/import-openapi",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({
                        content: content,
                        filters: filters
                    }),
                    success: function(result) {
                        if (result.success) {
                            createEndpointNodes(result.endpoints, result.apiInfo);
                        } else {
                            showImportError(result.error || "Import failed");
                            $("#openapi-import-btn").prop("disabled", false).text("Import Selected");
                        }
                    },
                    error: function(xhr) {
                        var msg = "Import failed";
                        if (xhr.responseJSON && xhr.responseJSON.error) {
                            msg = xhr.responseJSON.error;
                        }
                        showImportError(msg);
                        $("#openapi-import-btn").prop("disabled", false).text("Import Selected");
                    }
                });
            }

            function createEndpointNodes(endpoints, apiInfo) {
                // Get the current server node's config
                var serverConfig = node.id;
                var serverNode = RED.nodes.node(node.id);

                // Create endpoint nodes
                var createdNodes = [];
                var baseX = 300;
                var baseY = 100;
                var yOffset = 80;

                endpoints.forEach(function(endpoint, index) {
                    // Create node configuration
                    var nodeConfig = {
                        id: RED.nodes.id(),
                        type: "api-endpoint",
                        z: RED.workspaces.active(),
                        name: endpoint.name,
                        server: serverConfig,
                        path: endpoint.path,
                        method: endpoint.method,
                        validationEnabled: endpoint.validationEnabled,
                        bodySchema: endpoint.bodySchema,
                        querySchema: endpoint.querySchema,
                        paramsSchema: endpoint.paramsSchema,
                        successStatusCode: endpoint.successStatusCode,
                        responseContentType: endpoint.responseContentType,
                        responseSchemas: endpoint.responseSchemas,
                        validateResponseEnabled: endpoint.validateResponseEnabled,
                        requiredScopes: endpoint.requiredScopes,
                        scopeOperator: endpoint.scopeOperator,
                        crudOperation: endpoint.crudOperation,
                        tableName: endpoint.tableName,
                        primaryKey: endpoint.primaryKey,
                        autoGenerateSql: endpoint.autoGenerateSql,
                        useFlowOutput: endpoint.useFlowOutput,
                        paginationEnabled: endpoint.paginationEnabled,
                        defaultPageSize: endpoint.defaultPageSize,
                        maxPageSize: endpoint.maxPageSize,
                        paginationStyle: endpoint.paginationStyle,
                        filteringEnabled: endpoint.filteringEnabled,
                        filterableFields: endpoint.filterableFields,
                        sortingEnabled: endpoint.sortingEnabled,
                        sortableFields: endpoint.sortableFields,
                        defaultSortField: endpoint.defaultSortField,
                        defaultSortDirection: endpoint.defaultSortDirection,
                        transformationEnabled: endpoint.transformationEnabled,
                        requestTransformExpression: endpoint.requestTransformExpression,
                        responseTransformExpression: endpoint.responseTransformExpression,
                        fieldMappings: endpoint.fieldMappings,
                        rateLimitingEnabled: endpoint.rateLimitingEnabled,
                        rateLimitRequests: endpoint.rateLimitRequests,
                        rateLimitWindowMs: endpoint.rateLimitWindowMs,
                        rateLimitKeyType: endpoint.rateLimitKeyType,
                        rateLimitCustomKeyPath: endpoint.rateLimitCustomKeyPath,
                        cachingEnabled: endpoint.cachingEnabled,
                        cacheTTL: endpoint.cacheTTL,
                        cacheMaxSize: endpoint.cacheMaxSize,
                        cacheKeyStrategy: endpoint.cacheKeyStrategy,
                        cacheKeyExpression: endpoint.cacheKeyExpression,
                        cacheVaryHeaders: endpoint.cacheVaryHeaders,
                        cachePrivate: endpoint.cachePrivate,
                        errorHandlingEnabled: endpoint.errorHandlingEnabled,
                        errorFormat: endpoint.errorFormat,
                        includeStackTrace: endpoint.includeStackTrace,
                        logErrors: endpoint.logErrors,
                        customErrorCodes: endpoint.customErrorCodes,
                        x: baseX,
                        y: baseY + (index * yOffset),
                        wires: [[]]
                    };

                    // Add node to workspace
                    var newNode = RED.nodes.add(nodeConfig);
                    if (newNode) {
                        createdNodes.push(newNode);
                    }
                });

                // Refresh the view
                RED.view.redraw(true);

                // Update history for undo
                RED.history.push({
                    t: "add",
                    nodes: createdNodes.map(function(n) { return n.id; }),
                    dirty: RED.nodes.dirty()
                });

                RED.nodes.dirty(true);

                showImportSuccess("Created " + createdNodes.length + " endpoint nodes. Deploy to activate.");
                $("#openapi-import-btn").prop("disabled", false).text("Import Selected");

                // Close the editor dialog
                setTimeout(function() {
                    RED.tray.close();
                }, 1500);
            }

            function escapeHtml(text) {
                if (!text) return "";
                var div = document.createElement("div");
                div.appendChild(document.createTextNode(text));
                return div.innerHTML;
            }
        }
    });
</script>

<script type="text/html" data-template-name="api-server">

        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">

    <div class="form-row">

        <input type="text" id="node-input-config">
    </div>

    <!-- Server Configuration -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-server"></i> Server Configuration
        </h4>
    </div>

    <div class="form-row">
        <label for="node-input-host"><i class="fa fa-globe"></i> Host</label>
        <input type="text" id="node-input-host" placeholder="0.0.0.0">

    <div class="form-row">
        <label for="node-input-port"><i class="fa fa-plug"></i> Port</label>
        <input type="number" id="node-input-port" placeholder="3000" min="1" max="65535">

    <!-- OpenAPI Configuration -->

            <i class="fa fa-file-code-o"></i> OpenAPI Configuration
        </h4>
    </div>

    <div class="form-row">
        <label for="node-input-openapiEnabled">
            <i class="fa fa-toggle-on"></i> Enable OpenAPI
        </label>
        <input type="checkbox" id="node-input-openapiEnabled" style="width: auto; margin-left: 5px;">
    </div>

    <div class="form-row openapi-config-row">
        <label for="node-input-openapiPath"><i class="fa fa-link"></i> Spec Path</label>
        <input type="text" id="node-input-openapiPath" placeholder="/openapi.json">
    </div>

    <div class="form-row openapi-config-row">
        <label for="node-input-swaggerUiEnabled">
            <i class="fa fa-book"></i> Enable Swagger UI
        </label>
        <input type="checkbox" id="node-input-swaggerUiEnabled" style="width: auto; margin-left: 5px;">
    </div>

    <div class="form-row openapi-config-row swagger-ui-path-row">
        <label for="node-input-swaggerUiPath"><i class="fa fa-file-text-o"></i> Docs Path</label>
        <input type="text" id="node-input-swaggerUiPath" placeholder="/docs">
    </div>

    <!-- Metrics Configuration -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-line-chart"></i> Metrics Configuration
        </h4>
    </div>

    <div class="form-row">
        <label for="node-input-metricsEnabled">
            <i class="fa fa-toggle-on"></i> Enable Metrics

        <input type="checkbox" id="node-input-metricsEnabled" style="width: auto; margin-left: 5px;">

    <div class="form-row metrics-path-row">
        <label for="node-input-metricsPath"><i class="fa fa-link"></i> Metrics Path</label>
        <input type="text" id="node-input-metricsPath" placeholder="/metrics">

    <!-- OpenAPI Import Section -->
    <div class="form-row" style="margin-top: 15px;">

            <i class="fa fa-upload"></i> Import from OpenAPI

    <div class="form-row">

    <div class="form-row">
        <label for="openapi-import-content"><i class="fa fa-code"></i> Spec</label>

    </div>

    <div class="form-row">
        <label>&nbsp;</label>
        <button type="button" id="openapi-preview-btn" class="red-ui-button" style="margin-right: 5px;">Preview</button>
        <button type="button" id="openapi-clear-btn" class="red-ui-button">Clear</button>

    <div id="openapi-import-error" class="form-row" style="display: none; color: #a00; padding: 5px; background: #fee; border-radius: 3px;">

    <div id="openapi-import-success" class="form-row" style="display: none; color: #070; padding: 5px; background: #efe; border-radius: 3px;">

    <div id="openapi-preview-results" style="display: none;">

            <div id="openapi-api-info" style="margin-bottom: 8px;"></div>

        <div class="form-row" style="margin-top: 10px;">

        <div id="openapi-path-list" style="max-height: 200px; overflow-y: auto; border: 1px solid #ccc; border-radius: 3px; padding: 5px; margin-left: 105px; background: #fff;">

        <div class="form-row" style="margin-top: 10px;">
            <label>&nbsp;</label>
            <button type="button" id="openapi-import-btn" class="red-ui-button red-ui-button-primary" disabled>Import Selected</button>
        </div>
    </div>

    <style>
        .openapi-path-row {
            padding: 3px 5px;
            border-bottom: 1px solid #eee;
        }
        .openapi-path-row:last-child {
            border-bottom: none;
        }
        .openapi-path-row label {
            width: auto !important;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .openapi-path-row code {
            font-size: 11px;
            background: #f0f0f0;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .method-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            margin-right: 4px;
        }
        .method-get { background: #61affe; }
        .method-post { background: #49cc90; }
        .method-put { background: #fca130; }
        .method-delete { background: #f93e3e; }
        .method-patch { background: #50e3c2; }
        .method-options { background: #9012fe; }
        .method-head { background: #9012fe; }
        .tag-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            background: #eee;
            margin-right: 4px;
        }
        .openapi-summary-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
    </style>
</script>

<script type="text/html" data-help-name="api-server">
    <p>API Server node that serves OpenAPI documentation and acts as the central registration point for API endpoints.</p>

    <h3>Overview</h3>
    <p>The API Server node provides:</p>
    <ul>
        <li>Automatic OpenAPI 3.0 specification generation from registered endpoints</li>
        <li>JSON and YAML spec endpoints for API documentation</li>
        <li>Optional Swagger UI for interactive API exploration</li>
        <li>Prometheus metrics endpoint for monitoring</li>
        <li>Endpoint registration and lifecycle management</li>
    </ul>

    <h3>Configuration</h3>

    <h4>Server Configuration</h4>
    <dl class="message-properties">
        <dt>Config</dt>
        <dd>Reference to an API Config node containing shared settings (database, OAuth2, etc.)</dd>

        <dt>Host</dt>
        <dd>The host address to bind to (default: 0.0.0.0 for all interfaces)</dd>

        <dt>Port</dt>
        <dd>The port number for the server (default: 3000)</dd>
    </dl>

    <h4>OpenAPI Configuration</h4>
    <dl class="message-properties">
        <dt>Enable OpenAPI</dt>
        <dd>When enabled, serves the OpenAPI specification at the configured path</dd>

        <dt>Spec Path</dt>
        <dd>URL path for the OpenAPI specification (default: /openapi.json). A YAML version is automatically available at /openapi.yaml</dd>

        <dt>Enable Swagger UI</dt>
        <dd>When enabled, serves interactive Swagger UI documentation (requires @fastify/swagger-ui package)</dd>

        <dt>Docs Path</dt>
        <dd>URL path for Swagger UI (default: /docs)</dd>
    </dl>

    <h4>Metrics Configuration</h4>
    <dl class="message-properties">
        <dt>Enable Metrics</dt>
        <dd>When enabled, exposes Prometheus metrics at the configured path</dd>

        <dt>Metrics Path</dt>
        <dd>URL path for Prometheus metrics endpoint (default: /metrics)</dd>
    </dl>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">any</span>
        </dt>
        <dd>Any message payload (passed through)</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">any</span>
        </dt>
        <dd>The original payload (passed through)</dd>

        <dt>server
            <span class="property-type">object</span>
        </dt>
        <dd>Server status information including host, port, endpoint count, and OpenAPI settings</dd>
    </dl>

    <h3>OpenAPI Generation</h3>
    <p>The OpenAPI specification is automatically generated from all API Endpoint nodes that reference this server. The spec includes:</p>
    <ul>
        <li><b>Paths</b> - All endpoint paths and HTTP methods</li>
        <li><b>Parameters</b> - Path, query, and header parameters with schemas</li>
        <li><b>Request Bodies</b> - Request body schemas for POST/PUT/PATCH methods</li>
        <li><b>Responses</b> - Response schemas for each status code</li>
        <li><b>Security</b> - OAuth2 security requirements from endpoint scopes</li>
        <li><b>Tags</b> - Automatically generated from path segments</li>
    </ul>

    <h3>Dependencies</h3>
    <p>Optional dependencies for full functionality:</p>
    <ul>
        <li><code>fastify</code> - Required for serving endpoints (npm install fastify)</li>
        <li><code>@fastify/swagger-ui</code> - Required for Swagger UI (npm install @fastify/swagger-ui)</li>
        <li><code>js-yaml</code> - Required for YAML output (npm install js-yaml)</li>
    </ul>

    <h3>Example URLs</h3>
    <p>With default configuration (port 3000):</p>
    <pre>http://localhost:3000/openapi.json  - OpenAPI spec (JSON)
http://localhost:3000/openapi.yaml  - OpenAPI spec (YAML)
http://localhost:3000/docs          - Swagger UI (if enabled)
http://localhost:3000/metrics       - Prometheus metrics</pre>

    <h3>Prometheus Metrics</h3>
    <p>When metrics are enabled, the following metrics are collected:</p>
    <ul>
        <li><b>api_gateway_http_requests_total</b> - Total HTTP requests by method, path, and status code</li>
        <li><b>api_gateway_http_request_duration_ms</b> - Request latency histogram</li>
        <li><b>api_gateway_http_errors_total</b> - HTTP errors (4xx and 5xx responses)</li>
        <li><b>api_gateway_http_status_codes_total</b> - Status code distribution</li>
        <li><b>api_gateway_keycloak_validation_duration_ms</b> - Keycloak token validation latency</li>
        <li><b>api_gateway_opa_policy_duration_ms</b> - OPA policy evaluation latency</li>
        <li><b>api_gateway_active_requests</b> - Currently active requests</li>
    </ul>

    <h3>Endpoint Registration</h3>
    <p>API Endpoint nodes automatically register with the server when deployed.
    The server tracks all registered endpoints and includes them in the generated OpenAPI specification.</p>

    <h3>Import from OpenAPI</h3>
    <p>You can import existing OpenAPI 3.0 specifications to auto-generate endpoint nodes:</p>
    <ol>
        <li><b>Upload or paste</b> an OpenAPI 3.0 specification (JSON or YAML)</li>
        <li><b>Preview</b> to see available paths, methods, and tags</li>
        <li><b>Select paths</b> to import (supports partial imports)</li>
        <li><b>Import</b> to generate API Endpoint nodes with configured schemas</li>
    </ol>
    <p>The importer automatically configures:</p>
    <ul>
        <li>Path and query parameter schemas</li>
        <li>Request body schemas</li>
