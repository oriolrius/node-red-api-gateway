<script type="text/javascript">
    RED.nodes.registerType('api-config', {
        category: 'config',
        defaults: {
            name: { value: "", required: true },
            // Database configuration
            dbType: { value: "postgres" },
            dbHost: { value: "localhost" },
            dbPort: { value: 5432 },
            dbName: { value: "" },
            // SQL Server specific options
            dbEncrypt: { value: true },
            dbTrustServerCertificate: { value: false },
            // Connection pool settings
            dbPoolMin: { value: 0 },
            dbPoolMax: { value: 10 },
            dbPoolIdleTimeout: { value: 30000 },
            dbPoolAcquireTimeout: { value: 15000 },
            // OAuth2/Keycloak configuration
            oauth2Enabled: { value: false },
            keycloakUrl: { value: "" },
            keycloakRealm: { value: "" },
            keycloakClientId: { value: "" },
            // JWT validation settings
            jwtValidateIssuer: { value: true },
            jwtIssuer: { value: "" },
            jwtValidateAudience: { value: true },
            jwtAudience: { value: "" },
            jwtClockTolerance: { value: 0 },
            jwtAlgorithms: { value: "RS256" },
            // OPA configuration
            opaEnabled: { value: false },
            opaUrl: { value: "http://localhost:8181" },
            opaPolicyPath: { value: "" },
            opaCacheTTL: { value: 60 },
            opaTimeout: { value: 5000 },
            opaRetryAttempts: { value: 3 },
            // TLS configuration
            tlsEnabled: { value: false },
            tlsRejectUnauthorized: { value: true },
            tlsMinVersion: { value: "TLSv1.2" },
            tlsCertPath: { value: "" },
            tlsKeyPath: { value: "" },
            tlsCaPath: { value: "" },
            // API Version configuration
            apiVersion: { value: "v1" },
            apiBasePath: { value: "/api" },
            apiVersionInPath: { value: true },
            // OpenAPI configuration
            openapiTitle: { value: "API Gateway" },
            openapiDescription: { value: "" },
            openapiContactName: { value: "" },
            openapiContactEmail: { value: "" },
            openapiContactUrl: { value: "" },
            openapiLicenseName: { value: "" },
            openapiLicenseUrl: { value: "" },
            openapiTermsOfService: { value: "" },
            // Logging configuration
            loggingEnabled: { value: true },
            logLevel: { value: "info" },
            logOutput: { value: "console" },
            logPrettyPrint: { value: false },
            logFilePath: { value: "" },
            logRedactHeaders: { value: true },
            logIncludeUserContext: { value: true }
        },
        credentials: {
            dbUser: { type: "text" },
            dbPassword: { type: "password" },
            keycloakClientSecret: { type: "password" }
        },
        label: function() {
            return this.name || "API Config";
        },
        oneditprepare: function() {
            // Toggle database credentials visibility
            $("#node-config-input-dbType").on("change", function() {
                var dbType = $(this).val();
                if (dbType === "none") {
                    $(".db-config-row").hide();
                    $(".db-mssql-row").hide();
                    $(".db-pool-row").hide();
                } else {
                    $(".db-config-row").show();
                    $(".db-pool-row").show();
                    // Show SQL Server specific options only for mssql
                    if (dbType === "mssql") {
                        $(".db-mssql-row").show();
                    } else {
                        $(".db-mssql-row").hide();
                    }
                }
            }).trigger("change");

            // Toggle OAuth2 section visibility
            $("#node-config-input-oauth2Enabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".oauth2-config-row").show();
                    // Trigger JWT validation toggles to update visibility
                    $("#node-config-input-jwtValidateIssuer").trigger("change");
                    $("#node-config-input-jwtValidateAudience").trigger("change");
                } else {
                    $(".oauth2-config-row").hide();
                }
            }).trigger("change");

            // Toggle JWT Issuer field visibility
            $("#node-config-input-jwtValidateIssuer").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".jwt-issuer-row").show();
                } else {
                    $(".jwt-issuer-row").hide();
                }
            }).trigger("change");

            // Toggle JWT Audience field visibility
            $("#node-config-input-jwtValidateAudience").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".jwt-audience-row").show();
                } else {
                    $(".jwt-audience-row").hide();
                }
            }).trigger("change");

            // Toggle OPA section visibility
            $("#node-config-input-opaEnabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".opa-config-row").show();
                } else {
                    $(".opa-config-row").hide();
                }
            }).trigger("change");

            // Toggle TLS section visibility
            $("#node-config-input-tlsEnabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".tls-config-row").show();
                } else {
                    $(".tls-config-row").hide();
                }
            }).trigger("change");

            // Toggle Logging section visibility
            $("#node-config-input-loggingEnabled").on("change", function() {
                if ($(this).is(":checked")) {
                    $(".logging-config-row").show();
                    // Trigger log output change to show/hide file path
                    $("#node-config-input-logOutput").trigger("change");
                } else {
                    $(".logging-config-row").hide();
                }
            }).trigger("change");

            // Toggle log file path visibility based on output selection
            $("#node-config-input-logOutput").on("change", function() {
                var output = $(this).val();
                if (output === "file" || output === "both") {
                    $(".logging-file-row").show();
                } else {
                    $(".logging-file-row").hide();
                }
            }).trigger("change");
        }
    });
</script>

<script type="text/html" data-template-name="api-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="Configuration name">
    </div>

    <!-- Database Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-database"></i> Database Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-dbType"><i class="fa fa-cog"></i> Type</label>
        <select id="node-config-input-dbType" style="width: 70%;">
            <option value="none">None</option>
            <option value="postgres">PostgreSQL</option>
            <option value="mysql">MySQL</option>
            <option value="mongodb">MongoDB</option>
            <option value="mssql">SQL Server</option>
        </select>
    </div>
    <div class="form-row db-config-row">
        <label for="node-config-input-dbHost"><i class="fa fa-server"></i> Host</label>
        <input type="text" id="node-config-input-dbHost" placeholder="localhost">
    </div>
    <div class="form-row db-config-row">
        <label for="node-config-input-dbPort"><i class="fa fa-plug"></i> Port</label>
        <input type="number" id="node-config-input-dbPort" placeholder="5432">
    </div>
    <div class="form-row db-config-row">
        <label for="node-config-input-dbName"><i class="fa fa-folder"></i> Database</label>
        <input type="text" id="node-config-input-dbName" placeholder="database name">
    </div>
    <div class="form-row db-config-row">
        <label for="node-config-input-dbUser"><i class="fa fa-user"></i> User</label>
        <input type="text" id="node-config-input-dbUser" placeholder="username">
    </div>
    <div class="form-row db-config-row">
        <label for="node-config-input-dbPassword"><i class="fa fa-lock"></i> Password</label>
        <input type="password" id="node-config-input-dbPassword" placeholder="password">
    </div>

    <!-- SQL Server Specific Options -->
    <div class="form-row db-mssql-row">
        <label for="node-config-input-dbEncrypt">
            <i class="fa fa-shield"></i> Encrypt Connection
        </label>
        <input type="checkbox" id="node-config-input-dbEncrypt" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row db-mssql-row">
        <label for="node-config-input-dbTrustServerCertificate">
            <i class="fa fa-certificate"></i> Trust Server Certificate
        </label>
        <input type="checkbox" id="node-config-input-dbTrustServerCertificate" style="width: auto; margin-left: 5px;">
    </div>

    <!-- Connection Pool Settings -->
    <div class="form-row db-pool-row" style="margin-top: 10px;">
        <label style="width: 100%; font-weight: bold;"><i class="fa fa-cubes"></i> Connection Pool</label>
    </div>
    <div class="form-row db-pool-row">
        <label for="node-config-input-dbPoolMin"><i class="fa fa-minus-circle"></i> Min Connections</label>
        <input type="number" id="node-config-input-dbPoolMin" placeholder="0" min="0" style="width: 70px;">
    </div>
    <div class="form-row db-pool-row">
        <label for="node-config-input-dbPoolMax"><i class="fa fa-plus-circle"></i> Max Connections</label>
        <input type="number" id="node-config-input-dbPoolMax" placeholder="10" min="1" style="width: 70px;">
    </div>
    <div class="form-row db-pool-row">
        <label for="node-config-input-dbPoolIdleTimeout"><i class="fa fa-clock-o"></i> Idle Timeout (ms)</label>
        <input type="number" id="node-config-input-dbPoolIdleTimeout" placeholder="30000" min="0" style="width: 100px;">
    </div>
    <div class="form-row db-pool-row">
        <label for="node-config-input-dbPoolAcquireTimeout"><i class="fa fa-hourglass-half"></i> Acquire Timeout (ms)</label>
        <input type="number" id="node-config-input-dbPoolAcquireTimeout" placeholder="15000" min="0" style="width: 100px;">
    </div>

    <!-- OAuth2/Keycloak Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-key"></i> OAuth2/Keycloak Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-oauth2Enabled">
            <i class="fa fa-cog"></i> Enable OAuth2
        </label>
        <input type="checkbox" id="node-config-input-oauth2Enabled" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-keycloakUrl"><i class="fa fa-link"></i> Keycloak URL</label>
        <input type="text" id="node-config-input-keycloakUrl" placeholder="https://keycloak.example.com">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-keycloakRealm"><i class="fa fa-globe"></i> Realm</label>
        <input type="text" id="node-config-input-keycloakRealm" placeholder="master">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-keycloakClientId"><i class="fa fa-id-card"></i> Client ID</label>
        <input type="text" id="node-config-input-keycloakClientId" placeholder="client-id">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-keycloakClientSecret"><i class="fa fa-lock"></i> Client Secret</label>
        <input type="password" id="node-config-input-keycloakClientSecret" placeholder="client-secret">
    </div>

    <!-- JWT Validation Settings -->
    <div class="form-row oauth2-config-row" style="margin-top: 10px;">
        <label style="width: 100%; font-weight: bold;"><i class="fa fa-id-badge"></i> JWT Validation</label>
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-jwtValidateIssuer">
            <i class="fa fa-check-square"></i> Validate Issuer
        </label>
        <input type="checkbox" id="node-config-input-jwtValidateIssuer" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row oauth2-config-row jwt-issuer-row">
        <label for="node-config-input-jwtIssuer"><i class="fa fa-building"></i> Issuer</label>
        <input type="text" id="node-config-input-jwtIssuer" placeholder="https://keycloak.example.com/realms/myrealm">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-jwtValidateAudience">
            <i class="fa fa-check-square"></i> Validate Audience
        </label>
        <input type="checkbox" id="node-config-input-jwtValidateAudience" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row oauth2-config-row jwt-audience-row">
        <label for="node-config-input-jwtAudience"><i class="fa fa-users"></i> Audience</label>
        <input type="text" id="node-config-input-jwtAudience" placeholder="my-client">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-jwtClockTolerance"><i class="fa fa-clock-o"></i> Clock Tolerance (s)</label>
        <input type="number" id="node-config-input-jwtClockTolerance" placeholder="0" min="0" style="width: 70px;">
    </div>
    <div class="form-row oauth2-config-row">
        <label for="node-config-input-jwtAlgorithms"><i class="fa fa-cog"></i> Algorithms</label>
        <select id="node-config-input-jwtAlgorithms" style="width: 70%;">
            <option value="RS256">RS256 (RSA + SHA-256)</option>
            <option value="RS384">RS384 (RSA + SHA-384)</option>
            <option value="RS512">RS512 (RSA + SHA-512)</option>
            <option value="ES256">ES256 (ECDSA + SHA-256)</option>
            <option value="ES384">ES384 (ECDSA + SHA-384)</option>
            <option value="ES512">ES512 (ECDSA + SHA-512)</option>
            <option value="PS256">PS256 (RSA-PSS + SHA-256)</option>
            <option value="PS384">PS384 (RSA-PSS + SHA-384)</option>
            <option value="PS512">PS512 (RSA-PSS + SHA-512)</option>
        </select>
    </div>

    <!-- OPA Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-shield"></i> OPA (Open Policy Agent) Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-opaEnabled">
            <i class="fa fa-cog"></i> Enable OPA
        </label>
        <input type="checkbox" id="node-config-input-opaEnabled" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row opa-config-row">
        <label for="node-config-input-opaUrl"><i class="fa fa-link"></i> OPA URL</label>
        <input type="text" id="node-config-input-opaUrl" placeholder="http://localhost:8181">
    </div>
    <div class="form-row opa-config-row">
        <label for="node-config-input-opaPolicyPath"><i class="fa fa-file-code-o"></i> Policy Path</label>
        <input type="text" id="node-config-input-opaPolicyPath" placeholder="v1/data/policy/allow">
    </div>
    <div class="form-row opa-config-row">
        <label for="node-config-input-opaCacheTTL"><i class="fa fa-clock-o"></i> Cache TTL (s)</label>
        <input type="number" id="node-config-input-opaCacheTTL" placeholder="60" min="0" style="width: 100px;">
    </div>
    <div class="form-row opa-config-row">
        <label for="node-config-input-opaTimeout"><i class="fa fa-hourglass-half"></i> Timeout (ms)</label>
        <input type="number" id="node-config-input-opaTimeout" placeholder="5000" min="0" style="width: 100px;">
    </div>
    <div class="form-row opa-config-row">
        <label for="node-config-input-opaRetryAttempts"><i class="fa fa-repeat"></i> Retry Attempts</label>
        <input type="number" id="node-config-input-opaRetryAttempts" placeholder="3" min="0" max="10" style="width: 70px;">
    </div>

    <!-- TLS/SSL Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-certificate"></i> TLS/SSL Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-tlsEnabled">
            <i class="fa fa-cog"></i> Enable TLS
        </label>
        <input type="checkbox" id="node-config-input-tlsEnabled" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row tls-config-row">
        <label for="node-config-input-tlsRejectUnauthorized">
            <i class="fa fa-check-circle"></i> Verify Certificates
        </label>
        <input type="checkbox" id="node-config-input-tlsRejectUnauthorized" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row tls-config-row">
        <label for="node-config-input-tlsMinVersion"><i class="fa fa-lock"></i> Min TLS Version</label>
        <select id="node-config-input-tlsMinVersion" style="width: 70%;">
            <option value="TLSv1">TLS 1.0</option>
            <option value="TLSv1.1">TLS 1.1</option>
            <option value="TLSv1.2">TLS 1.2 (Recommended)</option>
            <option value="TLSv1.3">TLS 1.3</option>
        </select>
    </div>
    <div class="form-row tls-config-row">
        <label for="node-config-input-tlsCertPath"><i class="fa fa-file"></i> Certificate</label>
        <input type="text" id="node-config-input-tlsCertPath" placeholder="/path/to/cert.pem">
    </div>
    <div class="form-row tls-config-row">
        <label for="node-config-input-tlsKeyPath"><i class="fa fa-key"></i> Private Key</label>
        <input type="text" id="node-config-input-tlsKeyPath" placeholder="/path/to/key.pem">
    </div>
    <div class="form-row tls-config-row">
        <label for="node-config-input-tlsCaPath"><i class="fa fa-shield"></i> CA Certificate</label>
        <input type="text" id="node-config-input-tlsCaPath" placeholder="/path/to/ca.pem">
    </div>

    <!-- API Version Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-code-fork"></i> API Version Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-apiVersion"><i class="fa fa-tag"></i> API Version</label>
        <input type="text" id="node-config-input-apiVersion" placeholder="v1">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiBasePath"><i class="fa fa-sitemap"></i> Base Path</label>
        <input type="text" id="node-config-input-apiBasePath" placeholder="/api">
    </div>
    <div class="form-row">
        <label for="node-config-input-apiVersionInPath">
            <i class="fa fa-link"></i> Include Version in Path
        </label>
        <input type="checkbox" id="node-config-input-apiVersionInPath" style="width: auto; margin-left: 5px;">
    </div>

    <!-- OpenAPI Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-file-code-o"></i> OpenAPI Documentation
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiTitle"><i class="fa fa-header"></i> API Title</label>
        <input type="text" id="node-config-input-openapiTitle" placeholder="API Gateway">
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiDescription"><i class="fa fa-align-left"></i> Description</label>
        <textarea id="node-config-input-openapiDescription" rows="3" style="width: 70%;" placeholder="API description for documentation"></textarea>
    </div>
    <div class="form-row" style="margin-top: 10px;">
        <label style="width: 100%; font-weight: bold;"><i class="fa fa-address-card"></i> Contact Information</label>
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiContactName"><i class="fa fa-user"></i> Contact Name</label>
        <input type="text" id="node-config-input-openapiContactName" placeholder="API Support">
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiContactEmail"><i class="fa fa-envelope"></i> Contact Email</label>
        <input type="text" id="node-config-input-openapiContactEmail" placeholder="support@example.com">
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiContactUrl"><i class="fa fa-link"></i> Contact URL</label>
        <input type="text" id="node-config-input-openapiContactUrl" placeholder="https://example.com/support">
    </div>
    <div class="form-row" style="margin-top: 10px;">
        <label style="width: 100%; font-weight: bold;"><i class="fa fa-legal"></i> License Information</label>
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiLicenseName"><i class="fa fa-certificate"></i> License Name</label>
        <input type="text" id="node-config-input-openapiLicenseName" placeholder="MIT">
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiLicenseUrl"><i class="fa fa-link"></i> License URL</label>
        <input type="text" id="node-config-input-openapiLicenseUrl" placeholder="https://opensource.org/licenses/MIT">
    </div>
    <div class="form-row">
        <label for="node-config-input-openapiTermsOfService"><i class="fa fa-file-text-o"></i> Terms of Service</label>
        <input type="text" id="node-config-input-openapiTermsOfService" placeholder="https://example.com/terms">
    </div>

    <!-- Logging Configuration Section -->
    <div class="form-row" style="margin-top: 15px;">
        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">
            <i class="fa fa-file-text-o"></i> Logging Configuration
        </h4>
    </div>
    <div class="form-row">
        <label for="node-config-input-loggingEnabled">
            <i class="fa fa-cog"></i> Enable Logging
        </label>
        <input type="checkbox" id="node-config-input-loggingEnabled" style="width: auto; margin-left: 5px;">
    </div>
    <div class="form-row logging-config-row">
        <label for="node-config-input-logLevel"><i class="fa fa-signal"></i> Log Level</label>
        <select id="node-config-input-logLevel" style="width: 70%;">
            <option value="trace">Trace (most verbose)</option>
            <option value="debug">Debug</option>
            <option value="info">Info (default)</option>
            <option value="warn">Warning</option>
            <option value="error">Error</option>
            <option value="fatal">Fatal</option>
            <option value="silent">Silent (no logging)</option>
        </select>
    </div>
    <div class="form-row logging-config-row">
        <label for="node-config-input-logOutput"><i class="fa fa-desktop"></i> Output</label>
        <select id="node-config-input-logOutput" style="width: 70%;">
            <option value="console">Console Only</option>
            <option value="file">File Only</option>
            <option value="both">Console and File</option>
        </select>
    </div>
    <div class="form-row logging-config-row logging-file-row">
        <label for="node-config-input-logFilePath"><i class="fa fa-file"></i> Log File Path</label>
        <input type="text" id="node-config-input-logFilePath" placeholder="./logs/api-gateway.log">
    </div>
    <div class="form-row logging-config-row">
        <label for="node-config-input-logPrettyPrint">
            <i class="fa fa-paint-brush"></i> Pretty Print (Dev)
        </label>
        <input type="checkbox" id="node-config-input-logPrettyPrint" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 10px; color: #666; font-size: 0.9em;">Human-readable format for development</span>
    </div>
    <div class="form-row logging-config-row">
        <label for="node-config-input-logRedactHeaders">
            <i class="fa fa-eye-slash"></i> Redact Sensitive Data
        </label>
        <input type="checkbox" id="node-config-input-logRedactHeaders" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 10px; color: #666; font-size: 0.9em;">Hide authorization headers, passwords</span>
    </div>
    <div class="form-row logging-config-row">
        <label for="node-config-input-logIncludeUserContext">
            <i class="fa fa-user"></i> Include User Context
        </label>
        <input type="checkbox" id="node-config-input-logIncludeUserContext" style="width: auto; margin-left: 5px;">
        <span style="margin-left: 10px; color: #666; font-size: 0.9em;">Add user ID/username to log entries</span>
    </div>
    <div class="form-row logging-config-row" style="margin-top: 10px; padding: 10px; background-color: #f5f5f5; border-radius: 4px;">
        <p style="margin: 0; font-size: 0.9em; color: #666;">
            <i class="fa fa-info-circle"></i> <strong>Environment Overrides:</strong><br>
            <code>API_GATEWAY_LOG_LEVEL</code> - Override log level<br>
            <code>API_GATEWAY_LOG_OUTPUT</code> - Override output destination<br>
            <code>API_GATEWAY_LOG_PRETTY</code> - Enable pretty printing (true/false)<br>
            <code>API_GATEWAY_LOG_FILE</code> - Override log file path
        </p>
    </div>
</script>

<script type="text/html" data-help-name="api-config">
    <p>Configuration node for API Gateway shared settings.</p>

    <h3>Overview</h3>
    <p>This configuration node stores shared settings used by API Server and API Endpoint nodes.
    It centralizes database connections, authentication, authorization, and TLS settings.</p>

    <h3>Database Configuration</h3>
    <p>Configure the database connection for API operations:</p>
    <ul>
        <li><b>Type</b> - Database type (PostgreSQL, MySQL, MongoDB, SQL Server)</li>
        <li><b>Host</b> - Database server hostname or IP</li>
        <li><b>Port</b> - Database server port</li>
        <li><b>Database</b> - Name of the database</li>
        <li><b>User/Password</b> - Database credentials (stored securely)</li>
    </ul>

    <h4>SQL Server Options</h4>
    <p>Additional options for SQL Server connections:</p>
    <ul>
        <li><b>Encrypt Connection</b> - Enable TLS encryption for database connections</li>
        <li><b>Trust Server Certificate</b> - Trust self-signed certificates (for development)</li>
    </ul>

    <h4>Connection Pool Settings</h4>
    <p>Configure connection pooling for better performance:</p>
    <ul>
        <li><b>Min Connections</b> - Minimum connections to maintain in pool (default: 0)</li>
        <li><b>Max Connections</b> - Maximum connections allowed in pool (default: 10)</li>
        <li><b>Idle Timeout</b> - Time in ms before idle connections are closed (default: 30000)</li>
        <li><b>Acquire Timeout</b> - Maximum time in ms to wait for a connection from the pool (default: 15000)</li>
    </ul>

    <h3>OAuth2/Keycloak Configuration</h3>
    <p>Configure OAuth2 authentication via Keycloak:</p>
    <ul>
        <li><b>Keycloak URL</b> - Base URL of the Keycloak server</li>
        <li><b>Realm</b> - Keycloak realm name</li>
        <li><b>Client ID</b> - OAuth2 client identifier</li>
        <li><b>Client Secret</b> - OAuth2 client secret (stored securely)</li>
    </ul>

    <h4>JWT Validation Settings</h4>
    <p>Configure how JWT tokens are validated:</p>
    <ul>
        <li><b>Validate Issuer</b> - Check that the token's issuer (iss) claim matches expected value</li>
        <li><b>Issuer</b> - Expected issuer URL (e.g., https://keycloak.example.com/realms/myrealm)</li>
        <li><b>Validate Audience</b> - Check that the token's audience (aud) claim matches expected value</li>
        <li><b>Audience</b> - Expected audience value (typically the client ID)</li>
        <li><b>Clock Tolerance</b> - Seconds of tolerance for token expiration checks (default: 0)</li>
        <li><b>Algorithms</b> - Allowed signing algorithms (RS256, ES256, etc.)</li>
    </ul>

    <h3>OPA Configuration</h3>
    <p>Configure Open Policy Agent for authorization:</p>
    <ul>
        <li><b>OPA URL</b> - URL of the OPA server (default: http://localhost:8181)</li>
        <li><b>Policy Path</b> - Path to the authorization policy (e.g., v1/data/policy/allow)</li>
        <li><b>Cache TTL</b> - Time in seconds to cache authorization decisions (default: 60)</li>
        <li><b>Timeout</b> - Request timeout in milliseconds (default: 5000)</li>
        <li><b>Retry Attempts</b> - Number of retry attempts on failure (default: 3)</li>
    </ul>

    <h3>TLS/SSL Configuration</h3>
    <p>Configure TLS/SSL for secure connections:</p>
    <ul>
        <li><b>Verify Certificates</b> - Whether to verify server certificates</li>
        <li><b>Min TLS Version</b> - Minimum TLS protocol version to allow (TLS 1.2 recommended)</li>
        <li><b>Certificate</b> - Path to client certificate file</li>
        <li><b>Private Key</b> - Path to client private key file</li>
        <li><b>CA Certificate</b> - Path to CA certificate file</li>
    </ul>

    <h3>API Version Configuration</h3>
    <p>Configure API versioning and base path for all endpoints:</p>
    <ul>
        <li><b>API Version</b> - Version string (e.g., "v1", "v2"). Used in paths and OpenAPI spec.</li>
        <li><b>Base Path</b> - Base path prefix for all endpoints (e.g., "/api")</li>
        <li><b>Include Version in Path</b> - When enabled, version is included in the path (e.g., "/api/v1/users")</li>
    </ul>
    <p>Example paths with version in path enabled:</p>
    <pre>/api/v1/users
/api/v1/products</pre>
    <p>Example paths with version in path disabled:</p>
    <pre>/api/users
/api/products</pre>

    <h3>OpenAPI Documentation</h3>
    <p>Configure OpenAPI 3.0 specification metadata:</p>
    <ul>
        <li><b>API Title</b> - Title displayed in the API documentation</li>
        <li><b>Description</b> - Detailed description of the API</li>
    </ul>

    <h4>Contact Information</h4>
    <p>Optional contact details for API support:</p>
    <ul>
        <li><b>Contact Name</b> - Name of the contact person or team</li>
        <li><b>Contact Email</b> - Email address for API support</li>
        <li><b>Contact URL</b> - URL for API support documentation</li>
    </ul>

    <h4>License Information</h4>
    <p>Optional license details:</p>
    <ul>
        <li><b>License Name</b> - Name of the license (e.g., "MIT", "Apache 2.0")</li>
        <li><b>License URL</b> - URL to the full license text</li>
        <li><b>Terms of Service</b> - URL to terms of service</li>
    </ul>

    <h3>Logging Configuration</h3>
    <p>Configure structured logging using Pino:</p>
    <ul>
        <li><b>Enable Logging</b> - Turn logging on/off globally</li>
        <li><b>Log Level</b> - Minimum level to log (trace, debug, info, warn, error, fatal, silent)</li>
        <li><b>Output</b> - Where to send logs (console, file, or both)</li>
        <li><b>Log File Path</b> - Path to log file when file output is enabled</li>
        <li><b>Pretty Print</b> - Human-readable format for development (slower, not for production)</li>
        <li><b>Redact Sensitive Data</b> - Automatically mask authorization headers and passwords in logs</li>
        <li><b>Include User Context</b> - Add user ID and username to log entries after authentication</li>
    </ul>

    <h4>Environment Variable Overrides</h4>
    <p>Log settings can be overridden via environment variables:</p>
    <ul>
        <li><code>API_GATEWAY_LOG_LEVEL</code> - Override log level (trace, debug, info, warn, error)</li>
        <li><code>API_GATEWAY_LOG_OUTPUT</code> - Override output (console, file, both)</li>
        <li><code>API_GATEWAY_LOG_PRETTY</code> - Enable pretty printing (true/false)</li>
        <li><code>API_GATEWAY_LOG_FILE</code> - Override log file path</li>
    </ul>

    <h4>Log Output Format</h4>
    <p>Logs are output in structured JSON format by default:</p>
    <pre>{
  "level": 30,
  "time": "2024-01-15T14:32:47.890Z",
  "requestId": "req-1702234567890-a1b2c3",
  "method": "POST",
  "url": "/api/v1/users",
  "userId": "user-123",
  "statusCode": 201,
  "duration": 45,
  "msg": "Request completed"
}</pre>
    <p>With pretty printing enabled (development only):</p>
    <pre>[14:32:47] INFO: Request completed
    requestId: "req-1702234567890-a1b2c3"
    method: "POST"
    url: "/api/v1/users"
    statusCode: 201
    duration: 45ms</pre>

    <h3>Usage</h3>
    <p>This configuration node appears in the config nodes sidebar. Select it from the
    dropdown in API Server or API Endpoint nodes to share these settings.</p>
</script>
