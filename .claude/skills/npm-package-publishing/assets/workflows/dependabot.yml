# Dependabot Configuration
# Automated dependency updates for npm and GitHub Actions
#
# Copy this file to .github/dependabot.yml in your repository
# Note: This goes in .github/ NOT .github/workflows/

version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "npm"
    # Group minor and patch updates together
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore specific packages or versions
    # ignore:
    #   - dependency-name: "lodash"
    #     versions: [">=5.0.0"]
    reviewers:
      - "your-username"
    assignees:
      - "your-username"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "your-username"
    assignees:
      - "your-username"
