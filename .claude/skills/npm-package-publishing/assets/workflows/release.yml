# Release Workflow
# Publishes to npm and creates GitHub release when a version tag is pushed
#
# Copy this file to .github/workflows/release.yml in your repository
#
# Required secrets:
#   NPM_TOKEN - npm automation token for publishing
#
# Usage:
#   npm version minor -m "Release v%s"
#   git push origin main --tags

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract changelog section for this version
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found {print}
          ' CHANGELOG.md)

          # Use default message if no changelog found
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi

          # Write to file to preserve newlines
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.changelog.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Publish pre-release versions to npm with appropriate tag
  # This job runs only for pre-release tags (beta, rc, alpha)
  publish-prerelease:
    name: Publish Pre-release
    runs-on: ubuntu-latest
    needs: test
    if: contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Determine npm tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == *"-beta"* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == *"-rc"* ]]; then
            echo "tag=rc" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == *"-alpha"* ]]; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
          else
            echo "tag=next" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm with tag
        run: npm publish --access public --tag ${{ steps.tag.outputs.tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
